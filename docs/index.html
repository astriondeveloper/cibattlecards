cumented at nasa, space force, or the navy test enterprise to fall back on. ### w2 \u2014 marquee positions are single task orders on an expiring vehicle, entering recompete windows the hwil and m&s franchises are oasis task orders (the awards are titled \"s3i oasis hwil\") [s3][s4], and their oasis position is on gsa's legacy full & open/sb pools [s20]. the $722m m&s task order's five-year pop dates from may 2021, and the tmas2 tenants five-year pop began october 1, 2021, so both franchises hit recompete in the 2026 window [s6][s7]; the two hwil orders run out around 2028 [s3][s4]. follow-ons must land on successor vehicles, and public materials do not show an oasis+ position for them (needs internal input: confirm their oasis+ status via gsa award data). aftc's stated intent to award them the tmss follow-on partially closes this at eglin [s36], but the army m&s recompetes are live capture targets. ### w3 \u2014 thin prime altitude at mda relative to jv-armed peers their documented mda prime award is a $62.8m a&as contract from 2016 [s14]; their own contracts page describes teams/teams-next participation as \"prime and subcontractor\" without naming current prime segments [s15]. the big teams-next segments went to purpose-built jvs and large primes: specialized engineering analyses to ntsi (nou systems + mtsi, $637m), systems test support to mobius-parsons ($567m), agency operations to vettech llc (~$348m), and pp&a to strategic alliance solutions ($361m) [s16]. at mda they likely feed on subcontract share rather than owning the franchise (needs internal input: which teams-next primes they sub to and at what workshare). ### w4 \u2014 the air force expansion is recent and modest in scale their tmas armament release says the task order \"adds approximately 100 torch employees\" in shalimar and albuquerque [s8]. the air force weapons group is headquartered in shalimar with employee-owners scattered across seven other cities, and was stood up under an svp promoted in february 2023 [s30]. against incumbents with decades of aftc a&as history and thousands of cleared staff across eglin and edwards, their local bench and aftc-specific past performance are shallow, and their first tmas2 wins date only to late 2021 [s7][s8]. ### w5 \u2014 founder-era leadership handoff still settling since 2019 the top structure has been reshuffled repeatedly: watson took torch president/ceo in the january 2019 transition, roark moved to starfish ceo and later stepped down to chairman as watson took the starfish ceo seat, walker became torch president effective january 1, 2023, and a new evp layer was created in may 2026 [s27][s28][s29][s31]. each step has been orderly, but the operating company is now led by executives one or two steps removed from the founders while the founder generation exits (judgment: relationship capital with legacy redstone customers may be aging out with them). - time captures to w2. the $722m s3i m&s recompete and any aftc follow-ons that escape sole-source intent are the openings; get white papers and customer touchpoints in now, and force vehicle questions (successor-vehicle status, continuity plans) into industry days. - at eglin and kirtland (w4), run up the score on presence: our aftc bench, badge-in-hand headcount, and test-wing past performance dwarf a roughly 100-person expansion group. make local staffing density, aftc cpars relevance, and surge-in-place scored discriminators. - at mda (w3), position our prime credentials against their sub posture: require prime-executed past performance and disclosed workshare. consider blocking teaming: if they need a prime to ride, make sure it is not against us. - against the s3i fortress (w1 flip side), do not assault hwil head-on; win the wrap-around scopes (independent analysis, t&e, software modernization) and position for breadth: we bring cross-service test-enterprise practice (usaf, navy, mda, nasa) they cannot cite [s2]. - neutralize the esop story rather than fight it: put named key personnel, program-level retention data, and transition-in hiring commitments on the table so continuity is evidence-based, not narrative-based (needs internal input: our program retention stats). - recruit-defend in huntsville: they draw from our exact labor pool with an ownership pitch; flag any pursuit where incumbent capture of our staff is plausible. (anticipated pushback, team judgment; replace with actual field feedback as it accumulates.) - **they say:** \"their people never leave; employee-owners give us continuity.\" **we say:** continuity is measurable, so score it: ask every offeror for program-level retention on the cited contracts and the named key personnel who will actually sit here. we commit named people with tenure records, not a corporate average (needs internal input: our retention figures). - **they say:** \"the incumbent team built these simulations; anyone else is transition risk.\" **we say:** the models, facilities, and data are government property the incumbent operates, not owns. ask for the data-rights inventory, then evaluate transition plans on evidence. we have executed incumbent-capture transitions of this size (needs internal input: cite specific transitions). - **they say:** \"they are the hometown favorite with twenty years here.\" **we say:** we are headquartered in the same town with a comparable local workforce; longevity with one directorate is not breadth. our team brings practices from the air force, navy, and mda test enterprises that a single-community incumbent has never had to develop. - **they say:** \"they can take this work on half a dozen vehicles.\" **we say:** vehicle count matters less than where this requirement will actually be placed and who holds that vehicle with capacity; ask offerors to confirm their position on the successor vehicle and their continuity plan if the order must move. - **they say:** \"they win protests; their wins stick.\" **we say:** that cuts both ways: their wins draw protests from every peer because margins are thin. the discriminating question is current, scope-relevant past performance, not litigation history. - \"what percentage of proposed key personnel are currently resident and badged at the government site of performance, and how long has each supported this specific customer?\" - \"can offerors cite past performance executed as the prime contractor, of comparable scope, within this agency in the last five years, and disclose prime-versus-subcontractor workshare on cited efforts?\" - \"what is the offeror's plan for order continuity if the incumbent contract vehicle expires or the follow-on is placed on a successor vehicle the offeror does not hold?\" - \"how many of the offeror's staff supporting this customer community can surge to this effort without degrading their other contracts with the same customer?\" - \"describe experience delivering comparable engineering and test services across at least three distinct dod customer communities, and how that cross-enterprise experience will be applied here.\" - \"what data rights and configuration control will the government hold over models, simulations, and tools developed or modified under this effort?\" ### g1 \u2014 established on-site test-enterprise bench - ghost: \"offerors should demonstrate an established, currently staffed presence at the government test site, including on-site headcount, cleared personnel available at award, and the fraction of proposed key personnel already resident and badged at contract start.\" - targets: w4 - proof: pp4 ### g2 \u2014 breadth beyond a single customer community - ghost: \"offerors should describe past performance delivering comparable engineering, modeling and simulation, and test support across multiple service and agency customer communities, and how enterprise reach-back beyond a single geographic customer base will sustain performance through funding disruptions.\" - targets: w1 - proof: pp10 ### g3 \u2014 vehicle and transition co e": false, "last_reviewed": "2026-07-17", "search": "trideum corporation trideum trideum corporation is a huntsville-based, 100% employee-owned small business founded on february 28, 2005 by van sullivan, kurt lessmann, and lewis hundley, specializing in modeling and simulation (m&s), test and evaluation (t&e), live-virtual-constructive (lvc) test environments, and army training-simulation support [s1][s2][s4]. third-party trackers put headcount around 400 to 500, with a footprint centered on huntsville and satellite offices in orlando (near peo stri), leavenworth, and killeen [s1][s3]. its center of gravity is the army: a prime seat on the peo stri enterprise training services contract (etsc, $2.4b program ceiling), the aerial target systems 2 (ats-2) idiq out of acc-redstone, the cvate cyber test-environment prototype and distributed-lvc test work at atec's redstone test center, and the ramp rapid-prototyping idiq from acc-aberdeen [s6][s7][s9][s10][s24]. it has recently pushed onto our vehicles and into our services turf: a prime seat on the air force's $46b ewaac armament-acquisition idiq (aflcmc, march 2025), seaport-nxg unrestricted, and oasis+ unrestricted and total small business [s11][s15][s12][s13]. much of its marquee recent growth runs through the sba-approved nemean trideum joint venture (ntss jv), an 8(a) mentor-prot\u00e9g\u00e9 vehicle that has won the $90.5m national simulation center task order and the $58.9m white sands teas award [s20][s22][s23]. we collide with them squarely in our m&s/t&e lane: the army test enterprise at redstone and white sands, army training and mission-command simulation, and increasingly at the task-order level on oasis+, seaport-nxg, and ewaac [s6][s7][s23][s11]. they are smaller than us by roughly six-to-one, but sharp, fast, and armed with small-business and 8(a) primeability we do not have. trideum hurts us most where a niche m&s, lvc, or test-and-evaluation scope is set aside for small business or 8(a), because there ask-order execution, and the navy seaport-nxg position is vehicle access rather than a program [s11][s15]. against our aftc bench, badged headcount, and test-wing past performance, their armament-and-test presence at eglin is nascent, and their navy presence is on paper only. ### w6 - fresh top team during a growth-and-transition phase founder van sullivan stepped aside as ceo to become chairman on august 31, 2025; favio lopez moved up to ceo, and both a new coo (robert \"hoot\" gibson) and a new vp of growth (robi gjelstrup) were brought in [s16][s17][s18]. the transitions look orderly, but the operating company is running a fresh executive layer at the same time it pushes into new services and vehicles. (judgment: founder relationship capital with legacy army customers may be in transition.) - decide the set-aside question early (w2, w3). where a pursuit is small-business or 8(a) set-aside, we cannot prime, so pick the strongest small-business partner and lead the technical solution rather than ceding the evaluation to their team. where it is full-and-open or unrestricted, strip the advantage: require prime-executed, sole-entity past performance and current size certification, which neutralizes jv-borrowed past performance and any lapsed small-business claim. (needs internal input: our redstone and white sands small-business teaming posture.) - run up scale and reach (w1). on enterprise, multi-site, surge-heavy captures, make corporate capacity, fill-rate history, and reach-back scored discriminators. we staff thousands across the test enterprise; they staff a few hundred concentrated in army m&s and training. - force cross-enterprise breadth (w4). require past performance across multiple service and agency test communities (usaf aftc, navair, mda, nasa) that a single-service army specialist cannot cite. - at eglin and in air force armament and test scopes (w5), run up presence: our aftc bench, badge-in-hand headcount, and test-wing cpars dwarf a brand-new ewaac seat with no shown execution. - do not assault their genuine niche head-on (lvc and distributed test at redstone test center). win the wrap-around scope, the enterprise integration, and the independent-analysis role; concede the narrow prototype where it is theirs and take the larger envelope [s24]. - neutralize the esop and best-value stories with evidence: named key personnel, program-level retention data, and our own technical discriminators, so the customer is not paying a premium for a narrative. (needs internal input: our program retention figures.) - recruit-defend in huntsville: they draw from our labor pool with an ownership pitch; flag any pursuit where incumbent capture of our staff is plausible. (anticipated pushback, team judgment; replace with actual field feedback as it accumulates.) - **they say:** \"they are the m&s and lvc test specialists; they built the environment.\" **we say:** the models, tools, and test environments are government property the incumbent operates, not owns. ask for the data-rights and configuration-control inventory, then evaluate transition on evidence. specialist depth in one test center is not enterprise breadth, and we execute test across the air force, navy, and missile-defense enterprises. - **they say:** \"they can prime this as a small business or through their 8(a) joint venture, so it is lower risk and earns set-aside credit.\" **we say:** on a full-and-open or unrestricted requirement, ask every offeror for sole-entity, prime-executed past performance and a current sba size certification. a joint venture's 8(a) status belongs to the partner, and mentor-prot\u00e9g\u00e9 arrangements expire; evaluate the entity that will actually be accountable. - **they say:** \"employee-owned, low turnover, continuity you can count on.\" **we say:** continuity is measurable, so score it. ask for program-level retention on the cited contracts and the named key personnel who will sit here. we commit named people with tenure records, not a corporate average. (needs internal input: our retention figures.) - **they say:** \"the army paid a premium for them once; they win on best value.\" **we say:** that confirms they are not the low-cost option. on price-sensitive work they are beatable, and on best-value we welcome a discriminator-for-discriminator comparison. a single premium award is not a pattern. - **they say:** \"they are fast and agile: rapid prototyping, agile acquisition.\" **we say:** prototype-scale agility is not the same as sustained enterprise execution. ask for at-scale, multi-year delivery evidence of comparable scope performed as the responsible prime. - \"which cited efforts did the offeror perform as the responsible prime contractor in its own legal name, versus through a joint venture or as a subcontractor, and what workshare and management authority did it actually hold on each?\" - \"what is the offeror's current sba size status under the naics code for this requirement, and how would a change in that status affect performance if the contract spans multiple option years?\" - \"what currently staffed, cleared headcount can the offeror demonstrate at the government test site at proposal submission, and what is its documented fill-rate history at this installation?\" - \"can the offeror cite comparable test-and-evaluation or modeling-and-simulation past performance across at least three distinct service or agency customer communities, and describe how that cross-enterprise experience applies here?\" - \"what data rights and configuration control will the government hold over models, simulations, lvc environments, and tools developed or modified under this effort?\" - \"describe the offeror's experience delivering enterprise-scale, multi-site programs as the prime, including the corporate surge capacity available without drawing down other work for the same customer.\" ### g1 - sole-entity prime past performance - ghost: \"offerors should distinguish efforts performed as the responsible prime contractor in their own legal name from efforts performed through a joint venture or as a subcontractor, and should disclose the workshare, management responsibility, and past-performance ownership actually held on each cited effort.\" - targets: w3 - proof: pp6 ### g2 - enterprise scale and multi-site surge - ghost: \"offerors should demonstrate the corporate capacity to staff and sustain an enterprise-scale, multi-site effort, including current cleared headcount, documented fill-rate history, and the surge and reach-back available at contract start without degrading other work.\" - targets: w1 - proof: pp9 ### g3 - breadth beyond a single service and region - ghost: \"offerors should describe past performance delivering comparable modeling-and-simulation and test-and-evaluation support across multiple service and agency customer communities, and how enterprise reach-back beyond a single service and geographic base will sustain performance through funding or mission disruption.\" - targets: w4 - proof: pp1 ### g4 - established on-site presence at the test installation - ghost: \"offerors should demonstrate an established, currently staffed presence at the government test site, including on-site cleared headcount available at award and the fraction of proposed key personnel already resident and badged at contract start.\" - targets: w5 - proof: pp5 no wrap-rate or evaluated-price intel is documented. the one hard public data point cuts against a lowball read: in a 2021 army modeling and simulation office competition (rfp w56hzv-20-r-l850), the army selected trideum's higher-rated proposal over aerospace training systems partners at a 29% price premium, and gao denied the protest, finding the technical distinction justified the premium [s19]. that is evidence they win best-value trade-offs on technical merit rather than by buying in. judgment, labeled as such: a 100% employee-owned small business with no outside investors typically carries a lean cost structure and can price competitively on labor-rate work, but their pattern is to sell technical value, and their small-business and 8(a)-jv positioning lets them win set-aside work without a price fight. treat them as rate-competitive but premium-capable, not an lpta buy-in player, until data says otherwise. (needs internal input: rate observations from any shared oasis+, seaport-nxg, or ewaac task-order competitions.) ### pp1 - peo stri training franchise: etsc, mtccs, and jbsa mtc trideum holds a prime seat on the enterprise training services contract (etsc), a peo stri / acc-orlando multiple-award idiq with a $2.4b program ceiling and a five-year period of performance, providing worldwide training and training-assistance services (exercise planning, training operations, and sustainment of training aids, devices, simulations, and ranges) [s6]. it also holds an mtccs (mission training complex capabilities support) idiq and won the joint base san antonio mission training complex task order (july 30) for operator, instructor, technical, and administrative mission-command training support [s26]. ### pp2 - army redstone test and target incumbency: ats-2 and tsmo in july 2018 the u.s. army contracting command - redstone awarded trideum the aerial target systems 2 (ats-2) multiple-award idiq, worth over $93m over five years, for rdt&e and support of unmanned aerial target systems [s7]. under ats-2, trideum supports the army threat systems management office with towed-target data-logger hardware, test, and training, deploying qinetiq aerial targets at norfolk va, yuma az, and sarasota and pensacola fl [s8]. ### pp3 - cvate cyber test-environment prototype at atec trideum holds the cybersecurity vulnerability assessment test environment (cvate) prime contract, prototyping a cyber test environment inside the system-of-systems test capability being established at atec's redstone test center [s9]. ### pp4 - ramp rapid-prototyping idiq, $192m ceiling trideum holds the rapid acquisition of materials for prototyping (ramp) multiple-award idiq from army contracting command - aberdeen proving ground, a $192m ceiling over a three-year period [s10]. ### pp5 - ewaac prime seat, aflcmc armament, $46b ceiling on march 14, 2025 trideum was named a prime on the air force enterprise-wide agile acquisition contract (ewaac), an aflcmc armament directorate multiple-award idiq with a $46b ceiling and a period of performance through september 9, 2031, for expedited acquisition of weapons-system requirements [s11]. this is a shared-ceiling hunting license; no eglin or aftc task-order execution is shown in public materials to date. ### pp6 - nemean trideum joint venture: 8(a) mentor-prot\u00e9g\u00e9, nine awards trideum is the mentor in the sba-approved nemean trideum joint venture (ntss jv), formed july 2021 with nemean solutions, llc, an 8(a) native-hawaiian-owned, veteran-operated small business in sierra vista, az; ntss jv ii launched in late 2024 as the second jv under the mentor-prot\u00e9g\u00e9 program [s20][s23]. the jv won a joint test and evaluation contract (may 2022, work in ms, nv, and va) [s21], the $90,490,182 national simulation center support operations task order (start september 6, 2024; fort leavenworth, fort gregg-adams, fort cavazos), beating four competitors [s22], and the white sands test center teas contract (up to $58.9m, awarded october 1, 2025, contract w51ew725ca003), described as the jv's ninth collaborative award [s23]. ### pp7 - best-value win, protest-tested (gao b-419668) gao denied aerospace training systems partners' protest of an army award to trideum under rfp w56hzv-20-r-l850 for army modeling and simulation office m&s services; the agency found a meaningful technical distinction (trideum rated \"good\" with four strengths and two weaknesses, atsp \"marginal\") that justified paying a 29% price premium for trideum's proposal [s19]. ### pp8 - vehicle portfolio well beyond its size trideum holds oasis+ unrestricted (g
