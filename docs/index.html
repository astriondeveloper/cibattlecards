<script id="library-data" type="application/json">[{"slug": "anduril", "name": "Anduril Industries", "tier": 2, "status": "draft", "stale": false, "age_days": 0, "relationship": "competitor", "markets": ["autonomy", "counter-uas", "c5isr", "software-engineering", "missile-defense"], "agencies": ["army", "socom", "usaf-afmc", "usaf-aftc", "dhs", "mda"], "vehicles": ["agency-idiq"], "owner": "CI Owner", "example": false, "last_reviewed": "2026-07-17", "search": "anduril industries anduril is a venture-backed defense product company founded in 2017, headquartered in costa mesa, ca, that builds autonomous hardware (counter-uas towers and interceptors, autonomous aircraft and undersea vehicles, rocket motors) tied together by its lattice command-and-control software [s26]. it self-funds development with private capital and sells finished products at firm-fixed prices instead of performing cost-type development work [s28]. it reported roughly $2.2b revenue in 2025, projects $4.3b for 2026, employs about 7,000 people, and raised a $5b series h in may 2026 at a $61b valuation [s1][s2][s30]. it grows by acquisition (area-i 2021, dive technologies 2022, adranos 2023, blue force technologies 2023, numerica's radar/c2 lines 2025) [s26][s27]. we do not usually meet them head-to-head on a services rfp. the collision is structural: their enterprise agreements and \"systems integration partner\" roles absorb integration, test-support, fielding, and sustainment-engineering scope that agencies used to buy from services firms like us, at socom (c-uas and mission autonomy sip) [s7][s9], the army (a $20b, 10-year enterprise agreement) [s3][s4], and the usaf test enterprise, where their cca is now flown and turned by blue-suit crews at edwards under the eglin-based experimental operations unit [s12][s13]. they are also building a huntsville presence aimed at the missile, c-uas, and air-and-missile-defense community on our home turf [s16]. anduril rarely beats us in a source selection; it ling raised to ~$1.9b in nov 2024) [s7][s8]; socom mission autonomy sip ($86m, mar 2025) [s9]. - production wins in usaf autonomy: yfq-44a cca first flew oct 2025, entered serial production mar 2026, and was ordered into production alongside ga's fq-42 in jun 2026 (150 combined aircraft planned by 2030) [s10][s11]. - embedded in the usaf test enterprise: the 53rd wing's experimental operations unit flew multi-sortie cca tests at edwards in apr 2026 with front-line maintainers launching and recovering the jet [s12][s13]. - soldier program footholds: took over microsoft's ivas contract by novation (apr 2025) and won a $159m sbmc prototype award (sep 2025), teamed with meta on the eagleeye headset [s14][s15][s29]. - large fielded base at dhs/cbp: autonomous surveillance towers under an idiq with a $2b ceiling, ~$818m obligated as of dec 2025 [s21]. - international proof: first ghost shark xl-auv delivered to the royal australian navy (nov 2025) under an a$1.7b production program [s23]. - financial runway and growth: $2.2b (2025) to projected $4.3b (2026) revenue, $61b valuation [s1][s2]. - growing weapons/propulsion play: adranos acquisition (2023) and a mississippi solid-rocket-motor complex aimed at the srm shortage [s18][s26]. ### w1 \u2014 execution strain and quality escapes under hypergrowth a march 2026 wired investigation, based on interviews with current and former employees, described safety lapses, production delays, management churn, and deadline pressure across manufacturing sites; it reported the srm line missed its july 2025 mass-production target by more than a year, that the head of production was let go abruptly, and that in at least four military tests in 2025 anduril systems (including two altius drones) failed to perform as expected [s18]. in late june 2026 a rocket motor exploded during a test at their mississippi site, damaging the test stand (no injuries reported) [s19]. ### w2 \u2014 deep operating losses carried by venture capital the company "tier": 2, "status": "draft", "stale": false, "age_days": 0, "relationship": "competitor", "markets": ["c5isr", "cyber", "space-operations", "systems-engineering", "software-engineering", "autonomy"], "agencies": ["navsea", "ussf-ssc"], "vehicles": ["seaport-nxg", "agency-idiq"], "owner": "CI Owner", "example": false, "last_reviewed": "2026-07-17", "search": "general dynamics mission systems gdms general dynamics c4 systems general dynamics advanced information systems general dynamics mission systems (gdms) is the c5isr products-and-integration arm of general dynamics, formed in january 2015 by combining gd c4 systems and gd advanced information systems [s2]. it sits with gdit inside gd's technologies segment, which booked $13.47b revenue and $1.28b operating earnings (9.5% margin) in fy2025 with roughly 40,000 employees across the two units [s3]. gdms itself is roughly 12,000 people across 80+ facilities (est.), headquartered in the northern virginia area [s28]. its franchise positions are secure communications and crypto (taclane, ngld-m) [s1][s11], navy submarine electronics and lifecycle support (including the progeny systems business) [s21], strategic-deterrence weapon c2 [s27], and space ground segments (muos, sda's proliferated warfighter space architecture) [s12][s6]. we do not collide with them on hardware. we collide on the services and integration adjacencies wrapped around major programs: sda/ssc ground operations and sustainment, navy combat-system engineering and software support, and army c5isr integration, where gdms sells engineering services as pull-through around its own product baselines and its gdit sibling primes the pure-services work [s7][s21][s15]. gdms hurts us where an engineering-services scope sits next to hardware they already own. on muos ground sustainment they are the sole-source incumbent with up to $2.2b of runway [s12][s13][s14]; on sda ground they hold both the operations-and-integration and ground-management franchises [s6][s7]; on submarines progeny gives them the software and lifecycle-services lane inside navsea programs [s21]. when a customer bundles integration services with the fielded baseline, we start from behind. the compounding threat is the gd family play: gdms takes the product-adjacent work while gdit primes the large consolidated services contracts (for example the $988m navy sacss c5isr support award) [s15], squeezing mid-size primes from both sides. they rarely meet us head-on in seta, t&e, or range support; the fight is on systems-integration and o&m task orders at ssc/sda, navsea, and army c5isr programs. - ownership of fielded baselines: the customer's crypto devices, satcom ground system, or combat-system components are often gdms products, which makes them the default choice for the surrounding engineering and sustainment work [s11][s12][s21]. - nsa-certified crypto pedigree and classified infrastructure: type 1 encryption franchise (ngld-m: 265,000 units planned over 10 years) that few companies can touch [s11]. - proliferated-constellation ground expertise at sda: they designed and operate the tranche 1 ops centers and won the follow-on ground management and integration design contract [s7][s6]. - corporate reach-back and balance sheet of a $52.6b prime [s4], plus a services sibling (gdit) that lets the gd family bid both product and services sides of a mission area [s3][s15]. - seven decades of strategic-deterrence weapon c2 heritage that anchors credibility with nuclear-enterprise customers [s27]. - incumbent sole-source position on muos ground sustainment (10-year idiq awarded 2019 at $731.8m; max potential value $2.2b per gd's 10-k; fresh $106m ssc task order with options to $294.9m through may 2031) [s12][s13][s14]. - anchor sda ground franchises: $324.5m tranche 1 operations & integration (2022, teamed with iridium, ops centers at grand forks afb) and $491.6m ground management and integration design and development (sept 2024) [s7][s8][s6]. - growing again after a flat stretch: mission systems revenue up 11.7% in q1 2026, driven by space and international c5isr volume; technologies backlog $17.7b, book-to-bill 1.3x [s5]. - deep navy submarine services bench via progeny systems: $121m submarine software development, $66m darts, $15.3m security-toolkit award (to $91m with options), and an $18.2m aukus weapon-launch/simulation award [s21][s20][s23][s22]. - open-architecture positioning on army c5isr: won the initial cmff (cmoss mounted form factor) prototype award, $28.3m over two years via the c5 consortium ota [s9][s10]. - stable, connected leadership: president chris brady since january 2019, a six-time wash100 honoree, with recent senior hires in strategy, it, and space [s17][s18][s19]. ### w1 \u2014 product-oem posture limits objectivity on services work gdms is fundamentally a product and platform-integration house: crypto devices, satcom ground systems, combat-system hardware and software baselines [s11][s12][s21]. on any scope that involves independent assessment, test, or government-side advisory work touching those baselines, they carry an organizational-conflict-of-interest burden a non-oem services prime does not. their muos sustainment position is sole-source around their own system [s12], which customers increasingly flag as lock-in risk when they push for open architectures and data rights. ### w2 \u2014 multi-year revenue stagnation during legacy-program transition gd reported a revenue decline at mission systems in 2024, attributing it to the transition \"from legacy work to new growth lines of business,\" and technologies operating earnings fell 2% that year [s25]. gd's fy2025 10-k notes gdit grew faster than mission systems, diluting segment margin [s3]. the unit only returned to clear growth in q1 2026 [s5]. capture teams can expect them to defend legacy revenue aggressively while their growth bets (space, cmff) are still converting. ### w3 \u2014 second priority inside gd technologies for services captures the big consolidated services wins in their own back yard go to sibling gdit, not gdms: the $988m navy sacss c5isr support contract is a gdit award [s15], and gd's 10-k describes the two units going to market together \"when appropriate\" [s3]. on a pure engineering-services evaluation, gdms's own past performance is product-flavored; they either lean on gdit cpars (inviting relevance challenges) or bid work that is not their core. ### w4 \u2014 history of losing software-defined competitions to more agile entrants when the army moved dcgs-a to a commercial-software model, gdms lost to raytheon and palantir (march 2018) and gao denied its protest of the rejection of its proposal (b-416181) [s16]. dated, but it is the documented pattern: where an evaluation rewards commercial software agility over mil-spec integration heritage, their model has been beaten. ### w5 \u2014 thin footprint in our anchor geographies their huntsville presence is a single cummings research park office, listed in public directories at an estimated 100 to 249 staff [s26], against the thousands of local engineers the redstone customer community expects from an entrenched services partner. public materials show no comparable footprint at the usaf test-enterprise centers (needs internal input: confirm any gdms staffing at eglin, edwards, or on aftc task orders). - sell oem independence against w1. we own no hardware baseline, so our engineering, integration support, and t&e advice carries no product agenda and no oci mitigation plan the customer has to police. push evaluation language on objectivity, data rights, and open-architecture verification wherever their products sit on the program. - against their baseline incumbency (muos, sda ground, submarine electronics), do not attack the product; attack the wrap. position us for the government-side engineering, independent assessment, integration v&v, and test scopes that a prudent pmo keeps separate from the oem. - exploit w3 by forcing services evaluations onto services terms: dedicated key personnel, unit-level past performance relevance, and program-office intimacy. their strongest services cpars often belongs to a sibling unit, not the bidding entity. - exploit w5 at redstone, aftc, and mda: our people already sit with these customers. make local bench, clearance density on site, and surge-in-place a scored discriminator. - on software-centric work (w4), stress our agile delivery record and commercial tooling; frame mil-spec integration heritage as the wrong reference class for the scope. - where they are genuinely strong (space ground, crypto, submarine combat systems), consider teaming or deconfliction rather than head-on primes; the winnable ground is the services adjacency, not the baseline. - **they say:** \"the oem already knows the system; picking anyone else adds risk.\" **we say:** oem familiarity is real, and it is exactly why the government separates independent engineering and test from the baseline owner. we give the pmo an advocate with no product revenue at stake, and we inherit system knowledge through government-furnished artifacts and data rights the customer already paid for. - **they say:** \"they bring 40,000-person corporate reach-back.\" **we say:** reach-back that is shared across an entire segment is a staffing promise, not a staffing plan. ask every offeror what percent of named key personnel are dedicated full time to this contract and sitting locally. that is a question we win. - **they say:** \"their past performance is bigger.\" **we say:** bigger is not more relevant. their headline contracts are product and ground-system builds; ours are services of this scope, at this customer, at this contract size. cpars relevance criteria, applied honestly, favor us. - **they say:** \"they won the open-architecture prototype, so they own the roadmap.\" **we say:** a prototype ota is not a production franchise, and open standards exist precisely so the government is never dependent on one vendor. we help the customer keep it that way. - \"how will you ensure offerors with fielded hardware or software baselines on this program identify and mitigate organizational conflicts of interest, so the government keeps independent engineering advice?\" - \"should the evaluation require that cited past performance was executed by the specific business unit proposing, rather than an affiliated company?\" - \"what percentage of proposed key personnel will be dedicated full time and resident within commuting distance of the government site on day one?\" - \"how will offerors demonstrate that integration artifacts and interface documentation will be delivered with government purpose rights, so follow-on work stays competitive?\" - \"can offerors show recent agile software delivery on programs of this type, as opposed to hardware-baseline integration heritage?\" ### g1 \u2014 oem independence and oci - ghost: \"offerors should identify any organizational conflicts of interest arising from ownership of fielded hardware or software product baselines relevant to this program, and describe how their mitigation approach preserves objective engineering and test advice to the government.\" - targets: w1 - proof: pp5 ### g2 \u2014 services work led by the performing unit - ghost: \"offerors should demonstrate that cited past performance was executed by the business unit proposing on this effort, and describe how key personnel will be dedicated to this contract rather than matrixed across a corporate product portfolio.\" - targets: w3 - proof: pp7 ### g3 \u2014 staffed local presence - ghost: \"offerors should demonstrate an established, currently staffed presence near the government site, including local headcount, cleared personnel on site, and facilities available at contract start.\" - targets: w5 - proof: pp8 facts: gd technologies runs a 9.5% operating margin on a mixed products-and-services portfolio [s3]. their marquee sustainment position (muos) is sole-source, not price-competed [s12][s13], and ngld-m is unit-priced production [s11]. judgment, clearly labeled as such: expect them to price aggressively on product-adjacent integration work where product margins and irad can absorb pressure, and to be beatable on labor-rate-driven engineering-services competitions, where a large-business cost structure typically wraps higher than a mid-size prime. we have no documented rate intel. (needs internal input: wrap-rate or evaluated-price observations from any shared task-order competitions, e.g. ssc or navsea vehicles) ### pp1 \u2014 sda ground management and integration award, $491.6m space development agency awarded gdms a $491.6m design and development contract for the ground, management and integration (gmi) program, announced september 2024 [s6]. ### pp2 \u2014 sda tranche 1 operations & integration, $324.5m sda awarded the tranche 1 ground operations and integration contract to gdms at $324,516,613 (may 2022), including developing and operating operations centers at grand forks afb; gdms teamed with iridium [s7][s8]. ### pp3 \u2014 army cmff prototype award, $28.3m ota the army (peo c3n, pm mission command) awarded gdms a $28.3m, two-year award through the c5 consortium ota to deliver initial cmoss mounted form factor prototype systems, announced october 6, 2025. production remains to be competed [s9][s10]. ### pp4 \u2014 ngld-m crypto key loader, $229m over 10 years army awarded gdms a $229m contract (february 2022) to build the nsa-certified next generation load device-medium, with a 10-year period of performance and planned procurement of 265,000 units [s11]. ### pp5 \u2014 muos ground sustainment: sole-source incumbency to 2031 navy awarded gdms a $731.8m, 10-year sole-source idiq for muos ground system sustainment (november 2019) [s12]; gd's fy2024 10-k states a maximum potential value of $2.2b for muos sustainment under the space force [s13]; space systems command issued a $106m sustainment/modernization task order
