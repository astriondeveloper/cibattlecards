<script id="library-data" type="application/json">[{"slug": "anduril", "name": "Anduril Industries", "tier": 2, "status": "draft", "stale": false, "age_days": 6, "relationship": "competitor", "markets": ["autonomy", "counter-uas", "c5isr", "software-engineering", "missile-defense"], "agencies": ["army", "socom", "usaf-afmc", "usaf-aftc", "dhs", "mda"], "vehicles": ["agency-idiq"], "owner": "CI Owner", "example": false, "last_reviewed": "2026-07-17", "search": "anduril industries anduril is a venture-backed defense product company founded in 2017, headquartered in costa mesa, ca, that builds autonomous hardware (counter-uas towers and interceptors, autonomous aircraft and undersea vehicles, rocket motors) tied together by its lattice command-and-control software [s26]. it self-funds development with private capital and sells finished products at firm-fixed prices instead of performing cost-type development work [s28]. it reported roughly $2.2b revenue in 2025, projects $4.3b for 2026, employs about 7,000 people, and raised a $5b series h in may 2026 at a $61b valuation [s1][s2][s30]. it grows by acquisition (area-i 2021, dive technologies 2022, adranos 2023, blue force technologies 2023, numerica's radar/c2 lines 2025) [s26][s27]. we do not usually meet them head-to-head on a services rfp. the collision is structural: their enterprise agreements and \"systems integration partner\" roles absorb integration, test-support, fielding, and sustainment-engineering scope that agencies used to buy from services firms like us, at socom (c-uas and mission autonomy sip) [s7][s9], the army (a $20b, 10-year enterprise agreement) [s3][s4], and the usaf test enterprise, where their cca is now flown and turned by blue-suit crews at edwards under the eglin-based experimental operations unit [s12][s13]. they are also building a huntsville presence aimed at the missile, c-uas, and air-and-missile-defense community on our home turf [s16]. anduril rarely beats us in a source selection; it draft", "stale": false, "age_days": 6, "relationship": "competitor", "markets": ["test-evaluation", "range-operations", "rdte-support", "systems-engineering", "mission-engineering", "sustainment-logistics", "seta-advisory", "electronic-warfare", "c5isr", "space-operations", "cyber"], "agencies": ["usaf-afmc", "usaf-afrl", "navair", "navsea", "army", "army-devcom", "mda", "nasa", "ussf-ssc"], "vehicles": ["gsa-mas", "agency-idiq"], "owner": "CI Owner", "example": false, "last_reviewed": "2026-07-17", "search": "bae systems, inc. bae bae systems inc. bae systems, inc. is the us arm of british defense prime bae systems plc, headquartered in falls church, va, with roughly 35,000 to 36,200 us employees as of december 2024 and company materials citing annual us sales approaching $13.6b and a consistent top-10 pentagon-supplier ranking [s2][s4]. it is fundamentally a product and platform house organized around electronic systems (electronic warfare, electro-optical sensors, flight and engine controls, precision guidance and seekers, communications and data links), platforms & services us (combat vehicles, munitions, naval guns, ship repair), and intelligence & security, which sells the large-scale systems engineering, integration, and sustainment services that overlap our lanes [s1][s16]. in february 2024 it bought ball aerospace for $5.6b and rebranded it space & mission systems, adding about 5,200 mostly cleared staff in space payloads, sensors, and science instruments [s3]. we do not meet them on combat vehicles or ew hardware. we collide where a services scope sits next to their baselines: air force icbm/sentinel systems engineering and integration, rdt&e computing and range support, navy airborne-systems sustaining engineering, mda and space mission engineering, and the test-range instrumentation and threat-systems adjacency around aftc where they sell the hardware our test-enterprise people operate [s5][s6][s7][s14][s17][s18]. their us identity is also distinctive: as a foreign-owned entity they operate under a special security agreement with a us-citizen outside-director board that governs classified work [s9]. that structure, and the fact that services is a sideline to their platform franchises, is where the fight turns in our favor. bae hurts us when a services scope can be pulled through a platform or electronics baseline they already own, or when a customer wants one top-10 prime to carry a very large systems-engineering-and-integration contract. their marquee services position, the air force icbm integration support contract (isc 2.0) for minuteman iii sustainment and sentinel deployment, is a multibillion-dollar se&i scope they won, lost on re-evaluation, and won back on protest before the air force cancelled and restarted it [s5]. they operate dod's rdt&e supercomputing centers under a $699m program that directly serves test and evaluation and acquisition engineering [s6], and they hold recent navy and air force sustaining-engineering idiqs touching airborne systems, air traffic control, and avionics test equipment [s14]. on the test enterprise itself, they sell a full line of range instrumentation (radar, electro-optical, bomb scoring, target tracking, threat systems), the exact assets aftc ranges field [s7]. where they rarely beat us is a pure services or seta competition scored on dedicated key personnel, local bench, and unit-level past performance, and their foreign-ownership governance and product-oem conflicts give us clean, scored discriminators. - prime scale and balance sheet: a top-10 dod supplier inside a parent that booked \u00a328.3b in 2024 sales and a record \u00a377.8b backlog, able to carry se&i contracts and transition risk that squeeze mid-size primes [s4][s10]. - oem pull-through: they own ew, electro-optical, guidance, flight-control, and range-instrumentation baselines, which makes them the default for the surrounding sustaining-engineering and integration work [s7][s8]. - clearance density and classified infrastructure across intelligence & security and space & mission systems (over 60% of the acquired space workforce cleared), credible with ic and nuclear-enterprise customers [s3][s16]. - space and sensor reach after the ball acquisition: nasa-grade science instruments, space payloads, and the azalea intelligence satellite cluster now sit in-house [s3][s16]. - a us-operating posture that lets a british parent bid the full range of dod, ic, and homeland security work under a government-approved special security agreement [s9]. - franchise se&i scale: the air force icbm isc 2.0 recompete, reported at roughly $3.3b to $3.8b for the award with trade coverage citing a program value as high as about $12b, is a nuclear-enterprise systems-engineering-and-integration contract they competed at the top of the field [s5]. - rdt&e enabler for the whole test community: a $699m, five-year army award (2022, running to june 2027) to operate and manage the dod supercomputing resource centers at afrl wright-patterson, arl aberdeen, erdc vicksburg, and navy stennis, explicitly enabling research, test and evaluation, and acquisition engineering [s6]. - recent sustaining-engineering services wins across the services: a $138.5m single-award navy idiq for manned and unmanned airborne systems support through 2030, a $65.7m navy air-traffic-control sustainment and engineering idiq, a $98.9m air force idiq for avionics-test-equipment sustaining engineering, and a $73.4m navy combat-integration and identification-systems support idiq covering integration, in-service engineering, testing, and test-bed management [s14]. - deep test-range instrumentation and threat-systems product line (radar and electro-optical systems in fixed or mobile configurations, range data networks, bomb scoring, target flight characterization), the class of assets aftc and other ranges rely on [s7]. - dominant ew and airborne-electronics installed base built over 60-plus years, cited on roughly 80% of us fixed af test centers and the redstone customer community where our people already sit. (needs internal input: confirm bae's actual on-site services headcount and any active task-order footprint at eglin, edwards, and redstone before asserting a specific gap in a proposal.) - lead with oem independence against w1. we own no ew, sensor, guidance, or range-instrumentation baseline, so our test planning, integration verification, and engineering advice carries no product agenda and no oci mitigation plan the customer has to audit. push evaluation language on objectivity, independence, and data rights wherever their hardware sits on the program. - make foreign-ownership governance a scored discriminator against w2. where the work is sensitive or where continuity of us management control matters, ask the customer to weigh which offerors require foreign-ownership-control mitigation and which do not. we are a us-owned, us-controlled prime with no proxy governance to explain. - exploit services instability against w3. on se&i and seta recompetes, sell continuity, low transition risk, and a services-first delivery model against a competitor whose comparable flagship recompete churned through protests and a cancellation. continuity is a feature we can promise credibly. - force pure-services terms against w4. where they lack a hardware anchor, their record is beatable; insist on dedicated key personnel, unit-level past-performance relevance, and program-office intimacy rather than corporate breadth. - win the local-bench argument against w5. our people are badged and resident at aftc and redstone today. make staffed local presence, on-site clearance density, and surge-in-place a scored factor. - deconflict where they are genuinely the oem. on ew, sensor, space-payload, or range-instrumentation hardware, the winnable ground is the independent government-side engineering, test, and integration wrap, not the baseline; consider teaming or deconfliction there rather than a head-on prime. (needs internal input: any existing teaming history, ndas, or deconfliction with bae business units.) - **they say:** \"a top-10 prime brings scale and reach-back we can't match.\" **we say:** scale shared across a global product portfolio is a staffing promise, not a staffing plan. ask every offeror what percent of named key personnel are dedicated full time to this contract and resident at your site. that is the question a services-first team wins. - **they say:** \"they already own the ew, sensor, or range hardware, so they know the system.\" **we say:** oem familiarity is exactly why the government keeps independent engineering and test separate from the baseline owner. we give the program office an advocate with no product revenue at stake, and we inherit system knowledge through the data and artifacts you already paid for. - **they say:** \"they hold the icbm integration contract, so they own that mission.\" **we say:** that recompete was awarded, protested, reawarded, protested again, and then cancelled. continuity and low transition risk are real evaluation criteria, and they are ours to claim on se&i and seta work. - **they say:** \"a foreign parent is not an issue; they operate as a us company.\" **we say:** they operate well under a special security agreement, and that agreement exists because foreign ownership has to be mitigated. on sensitive scopes, a us-owned, us-controlled prime removes that variable from your risk picture entirely. - \"how will the evaluation ensure offerors that manufacture range instrumentation, sensors, or the systems under test identify and mitigate organizational conflicts of interest, so the government keeps independent test and engineering advice?\" - \"should offerors be required to disclose any foreign ownership, control, or influence affecting this effort, and describe how their mitigation preserves uninterrupted access and us management control for the full period of performance?\" - \"what percentage of proposed key personnel will be dedicated full time and resident within commuting distance of the government site at contract start, rather than matrixed from a corporate product portfolio?\" - \"for systems-engineering and integration support, how will offerors demonstrate continuity and transition-risk mitigation, given recent instability in comparable recompetes?\" - \"how will cited past performance be checked for relevance at the size and services scope of this effort, as opposed to platform or hardware-integration heritage?\" ### g1 \u2014 independence from the product baseline - ghost: \"offerors should identify any organizational conflicts of interest arising from ownership of test-range instrumentation, sensor, or electronic-warfare product baselines relevant to this effort, and describe how their mitigation approach preserves objective, independent test and engineering advice to the government.\" - targets: w1 - proof: pp10 ### g2 \u2014 foreign ownership, control, and influence - ghost: \"offerors should disclose any foreign ownership, control, or influence affecting performance of this effort, and describe how their government-approved mitigation ensures uninterrupted data access, personnel eligibility, and continuity of us management control throughout the period of performance.\" - targets: w2 - proof: pp9 ### g3 \u2014 continuity and dedicated engineering support - ghost: \"offerors should describe how they will ensure continuity and stability of systems engineering and integration support across the full period of performance, including how key personnel will be dedicated to this effort rather than matrixed from a broader corporate product and platform portfolio, and how transition risk will be mitigated where comparable recompetes have experienced repeated award disruption.\" - targets: w3 - proof: pp1 ### g4 \u2014 staffed local presence at the government site - ghost: \"offerors should demonstrate an established, currently staffed engineering presence at or near the government test site, including resident headcount, cleared personnel on site, and facilities available at contract start, rather than reliance on a distributed corporate footprint.\" - targets: w5 - proof: pp7 facts: bae is a top-10 dod prime inside a parent running roughly \u00a33.0b of underlying ebit on \u00a328.3b of 2024 sales, a mixed products-and-services book [s4][s10]. judgment, labeled as such: a prime of this size typically wraps higher than a mid-size services firm on labor-rate-driven engineering, seta, and test-enterprise competitions, so they are beatable where evaluated price turns on wrap rate rather than on product content. expect them to price most aggressively on sustaining-engineering and integration work adjacent to their own hardware, where platform and irad economics can absorb pressure. we have no documented rate intelligence on their services entities. (needs internal input: wrap-rate or evaluated-price observations from any shared task-order competitions, e.g., navair, mda, or air force test-enterprise vehicles.) ### pp1 \u2014 icbm isc 2.0 systems-engineering-and-integration recompete and protest saga the air force's icbm integration support contract (isc 2.0, rfp fa8207-21-r-0001) is an idiq for systems engineering and integration supporting minuteman iii sustainment and sentinel deployment, structured with a five-year base and up to an 18-year period of performance, reported at roughly $3.3b to $3.8b for the award and cited in trade coverage at a program value as high as about $12b. bae won in 2022; guidehouse protested and gao sent it back; the re-evaluation awarded to guidehouse in february 2024; bae protested and gao sustained (b-420860.4/.5/.6) on professional-compensation and cost-realism grounds; and in august 2024 the air force cancelled the award and restarted the competition [s5]. ### pp2 \u2014 $699m army award to operate dod rdt&e supercomputing centers in 2022 the army awarded bae a $699m, five-year contract (running to ty hunter program it has served since 2011, and keeps an eglin foothold dating to the tams/tmas era [s22][s23][s24][s11][s13]. we collide across our anchor accounts: redstone a&as task orders (express, s3i, smdc, mda), the usaf test enterprise (where it currently subs to us on the $543m tmas2 96 ctg order we prime), nasa, and space force operational support [s14]. the through-line is a 45-year relationship franchise that has lately lost its marquee primes (nasa msfc operations in 2022, the aftc c4isr prime seat in 2021) and backfilled with business-services wins and subcontract revenue [s21][s14][s22]. colsa hurts us most in redstone a&as competitions decided on incumbent relationships and price: express task orders, s3i technical management, smdc d3i, and mda/dia analysis and computing scopes where they have been resident for decades [s4][s5][s7][s8][s10]. they are proven takeaway artists in our neighborhood: they took the missile defense and space systems project-office support order (which picked up long range hypersonic weapon scope) off incumbent sigmatech in 2019, and took the nasa shared services center off gdit in 2023, surviving protests both times [s6][s22]. in space operations they hold a 14-year operational relationship with the bounty hunter defensive space control mission, positioning them for ussf space-ew growth we also want [s24]. at aftc the threat is graduation: they sub to us on 96 ctg today, know the 45th test squadron mission-planning test work first-hand, and have two decades of eglin a&as history to cite when the next round competes [s12][s13][s14]. expect them at essentially every redstone services pursuit we run, usually with a lean-priced, locally recruited offer and a long-tenured customer-facing bench. - forty-five years of continuous redstone presence: army missile/space commands since 1980, national small business prime contractor of the year in 1988 with nominations from three separate army organizations [s1][s33]. - a rare, sticky scientific-computing/hpc franchise supporting dia at redstone arsenal (missile and space intelligence center community), renewed as a ten-year, $217.4m idiq in 2021 [s10]. - space electronic warfare operations incumbency: continuous support to the bounty hunter defensive space control system since 2011, spanning development, operations, and worldwide sustainment [s24]. - the nasa enterprise business-services franchise (nssc at stennis) \u2014 a nasa-wide back-office position no other huntsville services rival holds [s22]. - vehicle breadth for a mid-tier: oasis+ unrestricted plus an oasis+ small-business r&d domain award, amcom express bpa, seaport-nxg, gsa mas, d3i domain 2, and agency idiqs at dia and niwc pacific [s27][s4][s28][s7][s10][s26]. - compliance signaling: cmmc level 2 with a perfect 110 score (assessed august 2025) and iso/iec 27001 certification, which they market as discriminators for cui-heavy work [s32]. - redstone a&as incumbency stack: amcom express prime bpa (w31p4q-18-a-0019, on the acc-rsa prime list as of december 2024) [s4]; devcom avmc s3i technical management support task order worth up to $342m awarded july 20, 2021 [s5]; smdc d3i domain 2 seat (information integration and data exploitation) [s7]. - missile-defense analysis pedigree: mda advanced research center support from 2007, extended in 2017 and re-won as a ~$168m follow-on idiq in march 2020; teams itma subcontract on the five stones research team ($50.1m) [s8][s9]. - protest-tested takeaway wins: the mdss project-office order taken from incumbent sigmatech (gao denied the protest, 2019) and the eglin tams 3 award upheld over madison research (gao, 2005) [s6][s13]. - dia scientific computing at redstone: $217.4m ten-year idiq (august 2021, three offerors competed), following a $103m predecessor from 2016 [s10]. - nasa breadth beyond huntsville: $400m ntss single-award ffp idiq at the nssc (june 2023, ~8.75-year pop, serving ~80,000 nasa personnel), taken from long-time incumbent gdit/csra, whose protest was withdrawn [s22]; significant subcontractor to caci on the $2b ncaps it task order (june 2024) [s23]. - space force operational franchise: bounty hunter support services ewaac task order (april 2025) for the defensive space control system they have supported since 2011; work in colorado springs, huntsville, and worldwide operational sites [s24]. - aftc/eglin history: tams 3 prime from 2005, tmas c4isr prime task order fa2486-16-f-0031 with a $69.6m modification in october 2018 covering rdt&e and acquisition support at eglin and other bases; today their mission planning training team supports the 45th test squadron [s13][s11][s12]. - growing navy/usmc and cyber lines: $59.4m niwc pacific tactical data link systems idiq (ordering may 2026-may 2031) [s26]; $37.6m seaport-nxg mcioc information-operations task at quantico [s25]; seven-year, $569m-ceiling tstorm advanced cyber operations contract (august 2016) under which they claim the first army-approved drone swarm [s30]. - fresh vehicle position: oasis+ unrestricted awardee announced december 17, 2024, plus an oasis+ small-business award in the r&d domain [s27]. ### w1 \u2014 marquee prime franchises lost this decade their two flagship positions eroded in quick succession. at nasa msfc, the hosc ground-systems franchise they had primed since 2012 (re-won april 2017, $196m ceiling) was consolidated into mossi/mossi ii and awarded away \u2014 first to kbr-owned sgt in 2020, then to teledyne brown engineering in september 2022 ($596.5m mission services plus $85m idiq), a takeaway from incumbents colsa and teledyne brown [s20][s21]. at aftc, their tmas c4isr prime seat was succeeded by the tmas2 96 ctg order won by us (oasis systems, $543m, april 6, 2021) with them relegated to subcontractor [s11][s14]. what replaced this revenue is business-process services (nssc) and subcontract share, which carry less past-performance weight for engineering-services evaluations [s22][s23]. ### w2 \u2014 documented procurement-integrity embarrassment at nasa gao sustained teledyne brown's protest of the $651.6m mossi award on september 24, 2020 (b-418835) because a nasa source-evaluation-board leader attended weekly dinner-and-foosball gatherings that included a high-level colsa official while the procurement was live; colsa was the predecessor prime and a major subcontractor to awardee sgt, nasa's own ethics counsel had recommended intervention, and gao found the appearance of impropriety irredeemable, recommending cancellation of both the award and the rfp [s19]. no wrongdoing finding attached to the company itself, but the episode is public, well-reported in procurement law circles, and permanently associates their relationship-driven capture style with oci risk [s19]. ### w3 \u2014 flat growth and a narrow customer base in a consolidating market industry analysis describes their headcount as effectively flat over two years, with a federal footprint concentrated in dod customers (air force, army, mda, navy) plus nasa and almost no other federal-civilian business [s30]. their washington technology top 100 rank drifted from #68 (2019) to #79 (2021) and #76 (2022) [s29], and third-party revenue estimates cluster at $250m-$360m with 1,100-1,500 staff \u2014 mid-tier scale without a mid-tier growth story [s2]. they built earlier growth partly on small-business set-asides (d3i domain 2 was an sb set-aside in 2016; the 2020 epass mq-9 order they chased was competed among oasis-sb holders) and now compete as a large business against far bigger primes without that pricing shelter [s7][s17]. ### w4 \u2014 founder-era, family-owned governance with unresolved succession the company is still chaired by its 1980 founder, whose army career predates the company's founding by three decades; public profiles variously list him as chairman, ceo, and head of a family holding entity, and there is no announced succession plan [s1][s31]. a coo layer (eric briggs) was added only recently to \"support company growth,\" alongside a new svp of space solutions [s31]. judgment, labeled as such: key relationships and sign-off authority appear concentrated in a founder generation that must transition soon, and a private family sale or recapitalization is a live wildcard for every long-pop pursuit they bid. (needs internal input: confirm current ceo/president and any known ownership-transition activity.) ### w5 \u2014 cannot win air force a&as prime seats outside legacy turf their epass record is losses and protests: in 2016 gao denied their protest after the air force rated their proposal technically unacceptable in an lpta award to odyssey systems [s16]; in 2020 their protest of the ~$248m epass mq-9 a&as order (fa8622-20-f-8236) was dismissed within a month [s17]. their current epass position is as a significant subcontractor to applied research solutions on the $1.22b epass 73 order (began february 1, 2025) [s18], and their aftc test-enterprise roles are subcontracts to us on 96 ctg and to bevilacqua research on the $270m tmas platforms team [s14][s15]. outside eglin-legacy scopes, their air force growth rides other primes' paper. - score currency and altitude (w1, w5): in any aftc, msfc-adjacent, or engineering-services evaluation, push for prime-executed, last-five-years past performance of comparable scope. their strongest recent primes are business services (nssc) and their engineering franchises are dated or subordinated; ours are current and prime. - own the 96 ctg relationship (w1): they see our tmas2 96 ctg execution from below. protect workshare boundaries, control customer-facing key personnel, and treat the recompete as an incumbent-defense with a known insider challenger. (needs internal input: current colsa workshare and positions on our 96 ctg order.) - at redstone, do not fight the relationship head-on; fight the evidence: 45 years of presence is not 45 years of relevant scope. force evaluations toward specific, recent, prime task-order performance in the exact directorate (s3i, mdss, smdc), where their record is a handful of orders, not a wall [s5][s6][s7]. - exploit the growth story (w3): where evaluators weigh corporate capacity, investment, and reach-back, contrast our ~3,000-person, multi-enterprise base and cross-service test practice with a flat, single-region firm. make surge, hiring pipelines, and corporate investment scored items. - let the integrity record speak through process ghosting (w2): never mention the episode by name; instead, make oci mitigation plans, procurement-integrity training, and disclosure regimes evaluated deliverables. their public history does the rest. - watch the succession seam (w4): a family sale or founder transition would disrupt key-personnel commitments and teaming loyalties mid-pop. track leadership announcements; position us as the stable landing spot for their program staff if turbulence hits. - at nasa, concede nothing at msfc: they no longer hold the hosc/mossi franchise [s21]. for msfc engineering scopes, treat them as a non-incumbent with aging past performance; our msfc work is the current reference point. (needs internal input: our msfc contract inventory to cite.) (anticipated pushback, team judgment; replace with actual field feedback as it accumulates.) - **they say:** \"they've been at redstone for 45 years \u2014 they know this customer better than anyone.\" **we say:** longevity is not incumbency on this scope. ask what they prime today in this directorate and when they last executed comparable work as the responsible prime; then compare current, scope-relevant cpars. we are headquartered in the same town with a comparable local bench and current prime performance. - **they say:** \"they're the low-cost hometown option \u2014 family company, no investors to feed.\" **we say:** evaluate price realism against staffing and retention commitments. a flat-headcount firm pricing lean has to recruit into the same huntsville labor market as everyone else; ask where the people come from and what programs they leave. (needs internal input: our rate position on shared vehicles.) - **they say:** \"they took nssc from gdit \u2014 they can beat the big primes.\" **we say:** that win was enterprise back-office services (finance, hr, procurement), not engineering. for technical scopes, look at what they have won as prime since 2021 in this mission area \u2014 and note their test-enterprise and msfc engineering franchises went to other companies at recompete. - **they say:** \"they're already on the team supporting this customer.\" **we say:** as a subcontractor. ask for prime-versus-sub workshare and management responsibility on every cited effort. riding another prime's paper is not managing the mission. - **they say:** \"their compliance posture is spotless \u2014 perfect cmmc score.\" **we say:** we meet the same bar (needs internal input: confirm our cmmc/iso status and score to state this precisely). certification is table stakes; ask all offerors for program-level security performance, not corporate certificates. - \"which contracts of comparable scope has the offeror performed as the responsible prime contractor within this customer community in the past five years, and what were the recompete outcomes of its three largest incumbent contracts?\" - \"what percentage of the proposed work will be performed by the offeror as prime versus by subcontractors, and what management authorities does the offeror actually hold on cited past-performance efforts?\" - \"describe the offeror's organizational-conflict-of-interest identification and mitigation program, including how contacts between company personnel and government officials are governed during active procurements.\" - \"provide the offeror's net headcount growth over the past three years and the hiring pipeline that will staff this effort without drawing down other programs for the same customer.\" - \"describe corporate ownership, governance, and leadership-continuity plans over the full period of performance, including commitments should a change of control occur.\" - \"describe experience delivering comparable services across multiple service and agency customer communities, and the enterprise reach-back that sustains performance if a single customer's funding is disrupted.\" ### g1 \u2014 franchise retention through recompete - ghost: \"offerors should identify their three largest incumbent contracts competed in the last five years, state whether each was retained at recompete, and describe how their capture and execution model sustains programs through contract transitions.\" - targets: w1 - proof: pp1 ### g2 \u2014 procurement-integrity and oci safeguards - ghost: \"offerors should describe their organizational-conflict-of-interest and procurement-integrity program, including policies governing employee interaction with government acquisition officials during active source selections and the corrective mechanisms applied when an appearance of impropriety arises.\" - targets: w2 - proof: pp2 ### g3 \u2014 prime-executed currency in the test enterprise - ghost: \"offerors should distinguish efforts performed as the responsible prime contractor from efforts performed as a subcontractor when citing past performance in this mission area, and should limit cited efforts to those executed within the last five years at comparable scope.\" - targets: w5 - proof: pp4 ### g4 \u2014 corporate capacity and growth trajectory - ghost: \"offerors should demonstrate the corporate capacity to grow and sustain the program workforce, including three-year headcount trends, current hiring pipelines in the region of performance, and enterprise reach-back beyond a single customer geography.\" - targets: w3 - proof: pp13 no wrap-rate or evaluated-price intel is documented. known facts: they compete in lpta arenas (the 2016 epass order they protested was awarded lowest-priced technically acceptable \u2014 and their proposal was rated technically unacceptable, meaning they lost on technical, not price) [s16]; their ntss win is firm-fixed-price, showing appetite for fixed-price enterprise services risk [s22]; the dia idiq mixes cpff, ffp, and t&m [s10]. judgment, labeled as such: a private, family-owned firm with no outside investors typically carries a lean cost structure and can price aggressively on labor-rate competitions in its home market; their flat growth suggests they defend base over margin. treat them as rate-competitive at redstone until data says otherwise. (needs internal input: rate observations from shared express, tmas2, or oasis+ task-order competitions.) ### pp1 \u2014 lost the msfc ground-systems franchise (mossi/mossi ii), 2020-2022 nasa consolidated the hosc contract (colsa's, since 2012) and the mo&i contract into mossi; the 2020 award went to kbr-owned sgt (with colsa as a major subcontractor) and was canceled after a sustained protest; the re-competed mossi ii went to teledyne brown engineering in september 2022 \u2014 $596.5m mission services value plus $85m idiq \u2014 reported as a takeaway from incumbents colsa and teledyne brown [s19][s20][s21]. ### pp2 \u2014 gao sustained the \"foosball\" oci protest naming a colsa official, september 24, 2020 in b-418835, gao found nasa's $651.6m mossi procurement irredeemably tainted by the appearance of impropriety: the acquisition's seb leader attended weekly dinner/foosball gatherings including a high-level colsa official during the procurement, over nasa ethics counsel's objection; gao recommended canceling the award and the entire rfp [s19]. ### pp3 \u2014 hosc incumbency, 2012-2022 colsa won the huntsville operations support center services contract in 2012 and the april 2017 follow-on (five-year, $196m ceiling) providing engineering, o&m, and system development for iss and other nasa programs at msfc [s20]. this franchise ended with mossi ii [s21]. ### pp4 \u2014 at aftc they now ride our prime: tmas2 96 ctg, april 6, 2021 the air force test c is, t&e, and experimentation [s8]. they also sub on the five stones research team for mda teams itma ($50.1m) [s9]. (needs internal input: who holds arc scope today, post-2023.) ### pp9 \u2014 dia scientific computing at redstone: $217.4m ten-year idiq, august 2021 colsa won the dia scientific computing operations, analysis, and applications idiq (cpff/ffp/t&m, through 2031, performed at redstone arsenal, three offerors) \u2014 the missile and space intelligence center community \u2014 following its $103m predecessor award from 2016 [s10]. ### pp10 \u2014 nssc takeaway from gdit: $400m ntss, june 2023 nasa awarded colsa the transformational shared services contract supporting the nasa shared services center at stennis: single-award ffp idiq, roughly 8.75 years including options, covering financial management, hr, and procurement services for ~80,000 nasa personnel; gdit (incumbent via csra since 2015) protested, then withdrew in july 2023 [s22]. ### pp11 \u2014 space ew franchise: bounty hunter support services, april 2025 colsa won the bhss full-and-open ewaac task order supporting development, operations, and sustainment of the bounty hunter defensive space control system for us space force space electronic warfare units, with work in colorado springs, huntsville, and worldwide operational sites; the company has performed this mission since 2011 [s24]. ### pp12 \u2014 2024-2026 diversification wins are mostly it/ops services or sub roles significant subcontractor to caci on nasa's $2b ncaps applications/platform services task order (june 10, 2024) [s23]; $37.6m seaport-nxg task supporting the marine corps information operations center at quantico [s25]; $59.4m niwc pacific tactical data link systems cpff idiq with a five-year ordering period from may 2026 [s26]; significant subcontractor to applied research solutions on the $1.22b aflcmc epass 73 order beginning february 1, 2025 [s18]. ### pp13 \u2014 scale and trajectory: flat mid-tier third-party estimates: ~1,1 ins, and fort walton beach fl in the eglin community, plus vienna and dc [s7]. we collide with them in the aflcmc a&as ecosystem where our legacy oasis systems business is an anchor incumbent, in daf digital and cyber staff support, and now at space systems command, where they took a $200m+ command staff support order and held it through protests [s9][s11][s13][s19]. the relationship is not purely adversarial: at eglin they are listed beside astrion as teaming partners on odyssey's eb (armament directorate) epass task [s33]. they claim to prime 95 percent of their work and were the self-described top performer on oasis sb pools 1 and 3 with roughly 50 oasis prime task orders [s8]. with their biggest single franchise (usaid) destroyed in 2025, their growth engine has one obvious place to point: defense services, which means at us. credence wins staff-heavy acquisition-support competitions on price, speed, and vehicle position, inside aflcmc and now at space force. they hold a decade-deep epass portfolio (their tenth epass task order came in may 2022, and the 2023 \"franken-cutter\" award consolidated two programs plus crows support) [s9][s10], and they reach set-aside work we cannot touch through an 8(a) mentor-protege jv that took the $337.6m c2isr epass order on oasis sb in october 2024 [s11][s12]. at ssc they beat small-business a&as peers for a $200-222m command staff support order and survived two gao protests, one of which forced a re-evaluation of whether their professional compensation was priced too low; that is the clearest public signal of how they compete on rates [s13][s14][s15][s16]. oasis+ unrestricted across six domains, including enterprise solutions (they say one of only 29 awardees), gives them a seat at the big consolidated orders we prime or chase [s18]. what they do not have: hands-on test and evaluation, range, aviation and missile engineering, or any documented footprint at aftc, redstone, mda, navair/navsea, or nasa. expect them wherever an evaluation reduces to staffing plans and price; do not expect them (yet) where facilities, instrumentation, and deep technical past performance decide. - rate competitiveness in professional-services evaluations: lean, founder-owned cost structure with no outside investors to feed, and a documented willingness to price professional compensation at levels competitors formally challenge [s14] (analysis; see pricing posture). - continuity story inside aflcmc: ten-plus epass task orders across hq afmc, c2isr, crows, and other directorates, with offices at all three main aflcmc hubs, so evaluators see a known quantity [s7][s9][s10][s11]. - a vehicle-and-jv lattice that covers every on-ramp: legacy oasis sb and unrestricted, oasis+ unrestricted (six domains), astro, ites-3s, gsa mas, dla jets 2.0, plus an 8(a) mentor-protege jv to keep set-aside channels open after size graduation [s8][s11][s12][s18][s26][s34]. - founder-led speed: two principals since 2011 make teaming, pricing, and bid decisions without a board or private-equity approval chain [s3][s4] (judgment). - workforce brand that recruits: washington post #1 government technology services top workplace and #2 overall for 2025, inc. 5000 honoree [s36]. - demonstrated bounce-back capacity: within months of the usaid collapse they booked a $107m state department contract and a $118.6m dla task order against 18 bidders [s25][s26]. - epass franchise depth: tenth epass task order by may 2022 (hq afmc a&as at wright-patterson); the december 2023 franken-cutter award merged two of their epass programs and added crows support, serving 17+ organizations with acquisition, engineering, scientific, financial, logistics, test, intelligence, and security-management staff [s9][s10]. - $337,639,354 c2isr division epass task order (fa872124fb005, october 2024) via credence dynamo solutions on oasis sb, supporting aflcmc's peo digital portfolio c2isr division work at robins afb [s11][s12]. - space force beachhead: $200-222m ssc advanced systems and development directorate command staff support order (directorate hq at kirtland afb with divisions at la afb, hill afb, and jsc), defended through btas and quantech gao protests and a corrective-action re-evaluation [s13][s14][s15][s16][s17]. - oasis+ unrestricted position (47qrca25du090, awarded december 17, 2024): six domains including enterprise solutions, management & advisory, technical & engineering, r&d, intelligence services, and logistics; first documented order is the $23.8m daf zero trust functional management office support task (august 2025) [s18][s19]. - vehicle breadth beyond oasis+: legacy oasis sb pools 1 and 3 (self-described top performer, ~50 oasis prime task orders, 95 percent prime), legacy oasis unrestricted, gsa astro, army ites-3s (unrestricted and sb), multiple gsa mas contracts, dla jets 2.0 [s8][s26][s34]. - jv production line: credence dynamo solutions has taken a $74m army resource-management order, a $45.8m army pmose task on oasis sb, isr services support at shaw afb ($28.6m cumulative through option year two), and a prime geoint support contract [s12][s29][s30][s37]. - ai/ml toehold at dla: defense automatic addressing system ai/ml task plus an ai/ml services contract [s27]; they also advertise advanced battle management system support [s35]. - growth and recognition: $500m+ claimed revenue as one of the few fully organically grown wt top 100 firms, washington post top workplaces #1 in government technology services for 2025, inc. 5000 honoree [s4][s5][s36]. - protest-hardened: their two biggest known franchises (ghtasc and ssc css) both survived multi-round gao challenges [s13][s14][s21]. ### w1 \u2014 their biggest franchise was destroyed in 2025 and the replacement book is a fraction of it credence held an $800m usaid global health task order (ghtasc, won 2022) and a ~$899m usaid bureau for humanitarian assistance support task order (2024) [s20][s21][s22]. the january 2025 stop-work orders hit immediately: npr reported credence, one of three main institutional-support staffing contractors to usaid, laid off nearly 400 employees within days [s23]. usaid formally ceased operations july 1, 2025, with roughly 83 percent of its programs canceled and the remainder moved to state [s24]. documented replacement wins since (a $107m state refugee-processing contract, a $118.6m dla task order) total well under the ceiling value of what collapsed [s25][s26]. that lost revenue creates pressure to win defense work fast, and pressure like that produces buy-in pricing and overreach (judgment). ### w2 \u2014 the portfolio is advisory staff support, not hands-on technical delivery every major dod win in public view is a&as or staff support: epass acquisition, financial, logistics, and security-management support to aflcmc offices [s9][s10][s11], command staff support at ssc [s13][s16], resource management and program-management support for the army [s29]. public sources reviewed for this card show no prime work at aftc, no redstone (avmc/amcom/smdc) presence, nothing at mda, navair, navsea, or nasa, and no operated labs, ranges, test facilities, or fielded hardware story (needs internal input: fpds pull to confirm the absence before treating it as settled). where an evaluation weighs test conduct, instrumentation, or engineering execution rather than staffing plans, they have little to cite. ### w3 \u2014 growth scaffolding rides small-business channels they have outgrown the marquee air force wins ride oasis sb, either directly from their legacy pools or through the credence dynamo 8(a) mentor-protege jv [s8][s11][s12]. as a graduated large business, their direct small-business channel dies with the legacy oasis sb ordering window, sba joint-venture rules limit how much of a set-aside job the mentor can perform, and the protege relationship has a regulatory shelf life. their unrestricted successor position (oasis+ u, december 2024) is real but young: one documented order as of this writing [s18][s19]. the transition years are the window to beat them in full-and-open competition before their unrestricted past performance accumulates (judgment on timing; facts cited). ### w4 \u2014 professional compensation drew formal realism scrutiny, and they cut staff fast under stress in the ssc css protests, gao's outcome-prediction adr concluded the agency had not properly evaluated credence's professional compensation plan under far 52.222-46 (the provision aimed at lowballed professional salaries on recompetes); gsa re-evaluated in corrective action and reaffirmed the award, and the final protest was denied [s14]. the award stood, but the record documents that their compensation levels were contestable ground. separately, the january 2025 stop-work response was near-immediate layoffs of ~400 people [s23]. for incumbent workforces deciding whose offer letter to sign at transition, both facts are usable (judgment on the use; facts cited). ### w5 \u2014 no presence in our anchor technical communities their listed offices are vienna, washington dc, fairborn, warner robins, and fort walton beach [s7]. nothing in huntsville, at edwards, in the hanscom/lexington cluster, at pax river, or in albuquerque appears in public listings, and their documented eglin-community role is as one of eight subcontractor partners on odyssey's armament directorate epass team, not a prime seat [s7][s33]. recruiting and surging cleared technical staff in those communities without a local bench is slow and expensive (judgment). - make evaluations technical (w2). push customers to score hands-on engineering execution: test conduct, instrumentation, lab and range operation, integration work, prime technical past performance in the mission area. their epass-style citations are administrative and program-office support; ours are not. this is the single sharpest separator. - time captures to their vehicle transition (w3). legacy oasis sb orders and the 8(a) jv channel are wasting assets. in full-and-open recompetes on oasis+ or agency idiqs, they show up with thin unrestricted past performance; force citations to be prime, recent, and comparable in contract type and size. - force jv transparency (w3). where they bid through a mentor-protege jv, drive questions about managing-venturer workshare, sba performance-of-work compliance, and which entity's people and processes actually execute. - contest staffing economics (w4). ask for total compensation plans evaluated per far 52.222-46, comparison to incumbent salary levels, and program-level retention data. pair our named key personnel and retention record against their protest-documented compensation scrutiny (needs internal input: our retention figures by program). - sell stability against their 2025 shock (w1). corporate steadiness, backlog quality, and staff continuity through funding turbulence are now legitimate discriminators; ask evaluators to weigh them. - out-local them (w5). in huntsville, at edwards, at eglin's test wing, and in the hanscom community, our badge-in-hand density and community tenure beat a proposal-time hiring plan. make on-site presence a scored item. - manage the teammate line at eglin. we sit on the same odyssey eb team [s33]; assume they see part of our staffing and rate behavior there, and be deliberate about what they can observe. where they grow ambitions from sub to prime in armament-adjacent scopes, treat them as a named threat early (needs internal input: eb workshare boundaries). (anticipated pushback, team judgment; replace with actual field feedback as it accumulates.) - **they say:** \"they'll do it cheaper.\" **we say:** ask what the labor mix and compensation plan look like at that price. in their highest-profile recent win, the government had to re-run the cost evaluation of their professional compensation under far 52.222-46 before the award stuck. underpaying professionals on a technical services contract is how incumbent capture fails and quality drains out; ask every offeror for comp-to-incumbent comparisons and retention history. - **they say:** \"they're everywhere at aflcmc; the customer knows them.\" **we say:** knowing the program office is not the same as doing the engineering. their portfolio is advisory and administrative support; ask offerors to cite prime-executed technical work, with named facilities, instrumentation, and test products, of this scope. - **they say:** \"they're a top workplace; they'll staff it fast.\" **we say:** staffing speed matters less than staying power. when their largest customer issued stop-work orders, roughly 400 staff were laid off within days. ask for continuity commitments and program retention rates, not recruiting awards. - **they say:** \"they rebuilt after usaid; they're financially fine.\" **we say:** their documented replacement wins are a small fraction of the ceilings they lost, which is exactly when a firm gets aggressive on price to rebuild volume. buy-in pricing is a performance risk the evaluation can and should test. - **they say:** \"their small-business jv can take this set-aside.\" **we say:** then the evaluation should confirm sba workshare compliance: who is the managing venturer, what share the protege actually performs, and whose past performance is really being offered. if the answer is \"the large mentor does the work,\" that is a compliance and continuity question, not a discriminator. - \"can offerors provide a total compensation plan per far 52.222-46, including a direct comparison of proposed salaries to current incumbent compensation, and describe how they will retain incumbent personnel at those levels?\" - \"what prime-executed technical past performance, as opposed to advisory and assistance or staff-augmentation support, can offerors cite in this mission area within the last five years?\" - \"for offerors proposing as a joint venture: which member is the managing venturer, what percentage of labor will each member perform, and how will sba joint-venture performance-of-work requirements be met and reported?\" - \"describe the offeror's record of workforce continuity through stop-work orders, funding gaps, or agency reorganizations in the last three years, including any reductions in force and their size.\" - \"how many of the offeror's current employees are resident and badged within commuting distance of the place of performance today, and what fraction of proposed key personnel are already on site?\" - \"what experience does the offeror have operating government test facilities, laboratories, ranges, or instrumentation as the responsible prime, and what data rights and configuration control did the government hold?\" ### g1 \u2014 hands-on execution versus staff augmentation - ghost: \"offerors should distinguish advisory and administrative support experience from hands-on engineering execution, and should cite prime-performed efforts in which their personnel operated test facilities, laboratories, instrumentation, or mission systems of comparable scope and complexity.\" - targets: w2 - proof: pp1 ### g2 \u2014 joint-venture workshare transparency - ghost: \"offerors proposing as a joint venture should identify the managing venturer, the percentage of work each member will perform, their approach to meeting sba joint-venture performance-of-work requirements, and whose corporate experience, processes, and personnel will actually execute the effort.\" - targets: w3 - proof: pp3 ### g3 \u2014 professional compensation realism - ghost: \"offerors should submit a total compensation plan consistent with far 52.222-46 that demonstrates realism against incumbent salary and benefit levels, and should explain how proposed compensation will retain the incumbent workforce through transition and the life of the contract.\" - targets: w4 - proof: pp4 ### g4 \u2014 corporate stability and concentration risk - ghost: \"offerors should describe corporate revenue stability, including any material concentration in a single customer ng with the same customers, at roughly two-thirds our size. they hurt us most where the customer wants an entrenched operational-test or ew-test support bench plus a staffing-continuity story: afotec fighter-test a&as at edwards, nellis, and yuma [s12], ew test support at eglin and edwards [s13], and nawcad air-vehicle t&e at pax river [s22]. in autonomy and human-machine teaming they out-credential most services firms our size: afrl's $94.7m asset award, mum-t research for the aerospace systems directorate, afsim master integrator status, and the army's ground-autonomy and crew-station labs [s11][s14][s15]. the arctos buy (march 2026) deepens their dayton mass in propulsion, flight, and aerospace test r&d right as afrl/aflcmc budgets consolidate [s17]. the esop pitch (ownership culture, retention) lands well with t&e program offices that fear contractor churn [s2]. they are beatable: army ground-vehicle dollars dominate their book, their aviation single-award wins run mid-sized ($40m to $77m), they just lost the air force mobility mission-planning re-set to morsecorp, boeing, and jacobs and could not overturn it at gao, and they show no redstone, mda, or space depth [s4][s22][s27][s3]. - 100% employee ownership as a scored-in discriminator: they sell ownership culture, low turnover, and key-person continuity, which resonates on long-lived t&e support contracts [s1][s2]. - afsim master integrator for afrl: they sit at the center of the air force's standard mission-level modeling and simulation framework, which makes them the default for analysis-heavy task orders [s11]. - autonomy and human-machine teaming pedigree that spans air and ground: afrl mum-t and sensing-autonomy assessment (asset), arl human autonomy teaming, gvsc crew automation and the castle autonomy-simulation environment [s11][s14][s15]. - deep, decades-long lab intimacy: 35+ years at gvsc [s9], eight afrl directorates supported from dayton [s16], nrl isr prototyping since before 2024 [s26]. - hardwa area [s28]. its franchise positions are secure communications and crypto (taclane, ngld-m) [s1][s11], navy submarine electronics and lifecycle support (including the progeny systems business) [s21], strategic-deterrence weapon c2 [s27], and space ground segments (muos, sda's proliferated warfighter space architecture) [s12][s6]. we do not collide with them on hardware. we collide on the services and integration adjacencies wrapped around major programs: sda/ssc ground operations and sustainment, navy combat-system engineering and software support, and army c5isr integration, where gdms sells engineering services as pull-through around its own product baselines and its gdit sibling primes the pure-services work [s7][s21][s15]. gdms hurts us where an engineering-services scope sits next to hardware they already own. on muos ground sustainment they are the sole-source incumbent with up to $2.2b of runway [s12][s13][s14]; on sda ground they hold both the operations-and-integration and ground-management franchises [s6][s7]; on submarines progeny gives them the software and lifecycle-services lane inside navsea programs [s21]. when a customer bundles integration services with the fielded baseline, we start from behind. the compounding threat is the gd family play: gdms takes the product-adjacent work while gdit primes the large consolidated services contracts (for example the $988m navy sacss c5isr support award) [s15], squeezing mid-size primes from both sides. they rarely meet us head-on in seta, t&e, or range support; the fight is on systems-integration and o&m task orders at ssc/sda, navsea, and army c5isr programs. - ownership of fielded baselines: the customer's crypto devices, satcom ground system, or combat-system components are often gdms products, which makes them the default choice for the surrounding engineering and sustainment work [s11][s12][s21]. - nsa-certified crypto pedigree and classified infrastructure: type 1 encryption franchise (ngld-m: 265,000 units planned over 10 years) that few companies can touch [s11]. - proliferated-constellation ground expertise at sda: they designed and operate the tranche 1 ops centers and won the follow-on ground management and integration design contract [s7][s6]. - corporate reach-back and balance sheet of a $52.6b prime [s4], plus a services sibling (gdit) that lets the gd family bid both product and services sides of a mission area [s3][s15]. - seven decades of strategic-deterrence weapon c2 heritage that anchors credibility with nuclear-enterprise customers [s27]. - incumbent sole-source position on muos ground sustainment (10-year idiq awarded 2019 at $731.8m; max potential value $2.2b per gd's 10-k; fresh $106m ssc task order with options to $294.9m through may 2031) [s12][s13][s14]. - anchor sda ground franchises: $324.5m tranche 1 operations & integration (2022, teamed with iridium, ops centers at grand forks afb) and $491.6m ground management and integration design and development (sept 2024) [s7][s8][s6]. - growing again after a flat stretch: mission systems revenue up 11.7% in q1 2026, driven by space and international c5isr volume; technologies backlog $17.7b, book-to-bill 1.3x [s5]. - deep navy submarine services bench via progeny systems: $121m submarine software development, $66m darts, $15.3m security-toolkit award (to $91m with options), and an $18.2m aukus weapon-launch/simulation award [s21][s20][s23][s22]. - open-architecture positioning on army c5isr: won the initial cmff (cmoss mounted form factor) prototype award, $28.3m over two years via the c5 consortium ota [s9][s10]. - stable, connected leadership: president chris brady since january 2019, a six-time wash100 honoree, with recent senior hires in strategy, it, and space [s17][s18][s19]. ### w1 \u2014 product-oem posture limits objectivity on services work gdms is fundamentally a product and platform-integration house: crypto devices, satcom ground systems, combat-system hardware and software baselines [s11][s12][s21]. on any scope that involves independent assessment, test, or government-side advisory work touching those baselines, they carry an organizational-conflict-of-interest burden a non-oem services prime does not. their muos sustainment position is sole-source around their own system [s12], which customers increasingly flag as lock-in risk when they push for open architectures and data rights. ### w2 \u2014 multi-year revenue stagnation during legacy-program transition gd reported a slight revenue decline at mission systems in 2024, attributing it to the transition \"from legacy work to new growth lines of business\"; segment growth that year was carried by gdit's fourth consecutive year of growth, with technologies revenue up 1.6% to $13.1b [s25]. gd's fy2025 10-k notes gdit grew faster than mission systems, diluting segment margin [s3]. the unit only returned to clear growth in q1 2026 [s5]. capture teams can expect them to defend legacy revenue aggressively while their growth bets (space, cmff) are still converting. ### w3 \u2014 second priority inside gd technologies for services captures the big consolidated services wins in their own back yard go to sibling gdit, not gdms: the $988m navy sacss c5isr support contract is a gdit award [s15], and gd's 10-k describes the two units going to market together \"when appropriate\" [s3]. on a pure engineering-services evaluation, gdms's own past performance is product-flavored; they either lean on gdit cpars (inviting relevance challenges) or bid work that is not their core. ### w4 \u2014 history of losing software-defined competitions to more agile entrants when the army moved dcgs-a to a commercial-software model, gdms lost to raytheon and palantir (march 2018) and gao denied its protest of the rejection of its proposal (b-416181) [s16]. dated, but it is the documented pattern: where an evaluation rewards commercial software agility over mil-spec integration heritage, their model has been beaten. ### w5 \u2014 thin footprint in our anchor geographies their huntsville presence is a single cummings research park office, listed in public directories at an estimated 100 to 249 staff [s26], against the thousands of local engineers the redstone customer community expects from an entrenched services partner. public materials show no comparable footprint at the usaf test-enterprise centers (needs internal input: confirm any gdms staffing at eglin, edwards, or on aftc task orders). - sell oem independence against w1. we own no hardware baseline, so our engineering, integration support, and t&e advice carries no product agenda and no oci mitigation plan the customer has to police. push evaluation language on objectivity, data rights, and open-architecture verification wherever their products sit on the program. - against their baseline incumbency (muos, sda ground, submarine electronics), do not attack the product; attack the wrap. position us for the government-side engineering, independent assessment, integration v&v, and test scopes that a prudent pmo keeps separate from the oem. - exploit w3 by forcing services evaluations onto services terms: dedicated key personnel, unit-level past performance relevance, and program-office intimacy. their strongest services cpars often belongs to a sibling unit, not the bidding entity. - exploit w5 at redstone, aftc, and mda: our people already sit with these customers. make local bench, clearance density on site, and surge-in-place a scored discriminator. - on software-centric work (w4), stress our agile delivery record and commercial tooling; frame mil-spec integration heritage as the wrong reference class for the scope. - where they are genuinely strong (space ground, crypto, submarine combat systems), consider teaming or deconfliction rather than head-on primes; the winnable ground is the services adjacency, not the baseline. - **they say:** \"the oem already knows the system; picking anyone else adds risk.\" **we say:** oem familiarity is real, and it is exactly why the government separates independent engineering and test from the baseline owner. we give the pmo an advocate with no product revenue at stake, and we inherit system knowledge through government-furnished artifacts and data rights the customer already paid for. - **they say:** \"they bring 40,000-person corporate reach-back.\" **we say:** reach-back that is shared across an entire segment is a staffing promise, not a staffing plan. ask every offeror what percent of named key personnel are dedicated full time to this contract and sitting locally. that is a question we win. - **they say:** \"their past performance is bigger.\" **we say:** bigger is not more relevant. their headline contracts are product and ground-system builds; ours are services of this scope, at this customer, at this contract size. cpars relevance criteria, applied honestly, favor us. - **they say:** \"they won the open-architecture prototype, so they own the roadmap.\" **we say:** a prototype ota is not a production franchise, and open standards exist precisely so the government is never dependent on one vendor. we help the customer keep it that way. - \"how will you ensure offerors with fielded hardware or software baselines on this program identify and mitigate organizational conflicts of interest, so the government keeps independent engineering advice?\" - \"should the evaluation require that cited past performance was executed by the specific business unit proposing, rather than an affiliated company?\" - \"what percentage of proposed key personnel will be dedicated full time and resident within commuting distance of the government site on day one?\" - \"how will offerors demonstrate that integration artifacts and interface documentation will be delivered with government purpose rights, so follow-on work stays competitive?\" - \"can offerors show recent agile software delivery on programs of this type, as opposed to hardware-baseline integration heritage?\" ### g1 ire government business into a new company through early 2027, it lost the $1.8b cosmos nasa recompete it had effectively held since 2018 and failed two protests, and its government-segment revenue was essentially flat year over year while contingency work in europe fell away [s4][s5][s6][s2][s1]. those give us clean, scoreable discriminators on focus, stability, and transition risk. - nasa human-spaceflight incumbency and workforce. decades of plan-train-fly and astronaut-health delivery mean the customer sees kbr as the people who train the astronauts and run the mission-control floor, not a vendor to be onboarded [s8][s9][s14]. - redstone and huntsville engineering mass through kbr wyle services. resident missile and aviation systems-engineering and seta staff embedded with peo missiles and space and the amcom community [s11]. - military-space and battlespace breadth from linquest and centauri. space force, air force, and intelligence relationships, plus directed-energy and cyber, that kbr pulls into adjacent bids [s12][s13]. - turnkey mission-operations delivery. a single prime bundling engineering, operations, training, and logistics, attractive to a customer who wants one accountable prime for an end-to-end mission [s8]. - scale, vehicle access, and balance sheet. a ~$7.8b company with roughly $23b in backlog and options and prime seats on astro, oasis+, and seaport-nxg that let it carry big idiqs at low perceived risk [s1][s2][s17]. - scale and profitability: fy2025 (year ended 2026-01-02) revenue of about $7.79b (up 1%), net income attributable to kbr of $415m (up 11%), and adjusted ebitda of $968m (a 12.4% margin, up 12%), with fy2026 guidance of $7.90b-$8.36b; about 38,000 employees across more than 29 countries [s1][s2]. - government (mts) segment mass: mts revenue of about $5.58b in fy2025 with $463m of operating income (up 12%), and total backlog and options of roughly $23.2b (about $16.9b firm), up 13% [s1][s2]. - nasa human-spaceflight franchise: imoc iii, worth up to $1.9b over a five-year base plus two two-year options, for mission planning, astronaut and flight-controller training, real-time flight execution, and exploration-vehicle design across jsc, msfc, and ksc [s8]. - nasa astronaut health: the follow-on human health and performance contract, an estimated $2.459b single-award idiq (base plus options about $3.6b) starting november 2025, largely at jsc [s9]. - redstone army missile engineering and seta: kbr wyle services systems-engineering and technical-assistance work for multiple air- and ground-launched weapon systems at redstone arsenal (a task order with a cumulative face value near $207.9m running to december 2031), plus a $165m tactical-missile engineering task order for the peo missiles and space tagm project office (hellfire and jagm) and about $207m of patriot systems-engineering work [s11]. - military-space and national-security depth: linquest ($737m, about 1,550 staff serving space force, air force, and intelligence across space, air dominance, and connected battlespace) and centauri (about $800m, military space, directed energy, and cyber) [s12][s13]. - test-and-evaluation and life-sciences heritage: the wyle acquisition ($600m, 2016) brought t&e of aircraft, advanced systems, and networks, plus systems and sustainment engineering and space-medical operations [s14]. - vehicle access: eight prime seats on gsa astro (services for manned, unmanned, and optionally manned platforms and robotics), plus oasis+ and seaport-nxg [s17]. ### w1 - the entire government business is being carved out through early 2027 in september 2025 kbr's board approved a plan to spin off its mission technology solutions segment, the whole government-and-space business that competes with us, into a separate publicly traded company; the spin-off is targeted to complete around january 2027, and as of mid-2026 the new company still had no announced name, a ceo-designate (michael larouche) who does not join until september 2026, and a cfo-designate joining in july 2026 [s4][s5]. for roughly eighteen months the organization we bid against is preoccupied with separating systems, standing up a new public company, retention, and rebranding rather than with any single program. a corporate separation of this scale is exactly the kind of distraction and transition risk a capture team can make scoreable, because it is legitimate to ask how a program will be insulated from the offeror's own reorganization. ### w2 - incumbency is not holding, even in the nasa crown jewel kbr lost the $1.8b cosmos recompete for nasa human-spaceflight mission operations at johnson space center to the ascend aerospace and technology joint venture; cosmos replaced the mission systems operations work kbr had effectively held since its 2018 acquisition of sgt, and after nasa took corrective action and re-awarded to the same team, gao denied kbr's follow-on protest in early 2026 [s6][s15]. when a company loses, protests, and loses again in the single franchise where its incumbency is deepest, its safe-incumbent narrative becomes a live question everywhere. continuity and low transition risk are scoreable criteria a churned incumbent cannot simply assert. ### w3 - flat government growth and contingency-revenue volatility kbr's government (mts) segment revenue was essentially flat in fy2025, rising just $26m to about $5.581b from $5.555b, and total-company fourth-quarter revenue fell 11% partly on reductions in eucom contingency scope [s1][s2]. kbr remains active in contingency logistics (it won a logcap v task order over an amentum parsons team whose protest gao dismissed), but that revenue is inherently lumpy and swings the top line quarter to quarter [s7]. a competitor whose core services base is flat, and whose headline movement leans on overseas contingency work rather than steady engineering-services growth in our lanes, is one whose promised reach-back and investment on any single program deserve scrutiny. ### w4 - multinational prime overhead and wrap on labor-driven competitions kbr is a ~$7.8b, 38,000-person prime operating in more than 29 countries and carrying corporate overhead, indirect structure, and shareholder-margin expectations (fy2025 adjusted ebitda margin about 12.4%), now layered with the cost and complexity of a corporate separation [s1][s4]. on t&e, seta, and mission-engineering competitions where evaluated price turns on the fully burdened labor rate rather than on scale, a large multinational's wrap is beatable by a focused mid-size firm. this is team judgment rather than documented rate intelligence, but it is a repeatable pattern where the buy is dominated by direct labor. (needs internal input: any observed evaluated-price or wrap-rate data from shared competitions on astro, oasis+, seaport-nxg, or redstone vehicles.) ### w5 - government mission diluted inside an industrial conglomerate until the spin-off completes, kbr's defense, space, and nasa work sits inside the same company that licenses more than 85 process technologies and builds ammonia, chemical, and clean-refining plants through its sustainable technology solutions segment [s4]. on a focused test-enterprise, mission-engineering, or redstone recompete, a dedicated engineering company can credibly argue that the customer's mission is one line inside a diversified industrial portfolio, while for us it is the core of the business. this weakness is time-boxed: once the standalone national-security company launches, kbr's government arm becomes a more focused ~$5b pure-play, so exploit the dilution argument hardest before the separation closes [s4][s5]. - sell focus and stability against w1, w2, and w5. position steady, dedicated staffing and low transition risk against a competitor that is carving out its entire government business, standing up a new public company with new leadership and no announced brand, and losing incumbent recompetes even in nasa. make \"who will hold this program steady through their own corporate separation\" a live evaluation question. - attack the incumbency assumption against w2. where kbr is the sitting incumbent, the cosmos loss shows incumbency is not destiny. press for continuity and transition-risk criteria, named key personnel, and evidence that the program survives the offeror's reorganization. - force focused, labor-scored terms against w4. where the buy is dominated by direct engineering labor and dedicated key personnel, insist on fully burdened rate realism and named on-contract staff so a large multinational wrap cannot hide behind scale. - be honest about local presence. at redstone, huntsville, and jsc, kbr has genuine resident mass, so proximity is not our wedge there; our wedge is focus, dedicated senior attention, and stability. at the air force test enterprise (edwards, eglin) and other sites, confirm kbr's actual on-site footprint before asserting a local-bench gap, because the wyle heritage gave them real afmc test presence. (needs internal input: confirm kbr and kbr wyle on-site headcount and active task orders at aftc and at our anchor customers before claiming a specific staffing gap.) - use oci situationally, not as the lead. unlike a hardware oem, kbr builds few of the systems under test, so the independence lever is narrower here than against product primes; deploy it only where kbr operates, sustains, integrates, or trains on the very system it would also be asked to assess independently. (needs internal input: any teaming, nda, or deconfliction history with kbr or its linquest and centauri units.) - **they say:** \"kbr trains the astronauts and flies the missions, so nobody knows nasa human spaceflight better.\" **we say:** deep familiarity is real, but nasa just moved its $1.8b mission-operations work to a different team and the decision was upheld on protest. score dedicated key personnel, transition risk, and continuity for this actual scope, not incumbency on programs that are themselves changing
