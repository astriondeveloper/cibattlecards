e of this effort, as opposed to much larger operations-and-logistics or platform-integration programs?\" ### g1 - insulation from corporate separation - ghost: \"offerors should describe how this effort will be insulated from any pending corporate separation, spin-off, divestiture, or reorganization on the offeror's side, including the governance, dedicated key personnel, and retention commitments that keep senior management attention and staffing stable across the transition and throughout the period of performance.\" - targets: w1 - proof: pp3 ### g2 - continuity and transition risk on recompete - ghost: \"offerors should describe how they will ensure continuity and stability of engineering and mission-operations support across the full period of performance, including dedicated, named key personnel and a transition approach that mitigates risk where prior comparable efforts have recently changed hands.\" - targets: w2 - proof: pp5 ### g3 - dedicated mission focus over a diversified portfolio - ghost: \"offerors should demonstrate how this effort will receive dedicated senior management attention and committed resources, rather than being supported as a minor element of a large, diversified portfolio spanning unrelated commercial and industrial markets, and how that focus is reflected in staffing, governance, and reach-back.\" - targets: w5 - proof: pp2 ### g4 - stable resourcing independent of contingency swings - ghost: \"offerors should demonstrate that the resources, reach-back, and investment committed to this effort are dedicated and durable, and not subject to reduction as other, contingency-driven or overseas portions of the offeror's business scale down.\" - targets: w3 - proof: pp7 facts: kbr is a ~$7.8b prime running an fy2025 adjusted ebitda margin near 12.4%, a services-and-operations-weighted profile; its government (mts) segment posted an operating margin around 8% ($463m on about $5.58b) [s1][s2]. its top line leans partly on lower-margin contingency logistics that can swing quarter to quarter, as the 11% fourth-quarter revenue decline on eucom scope reductions showed [s1]. judgment, labeled as such: a multinational prime of this size typically wraps higher than a focused mid-size services firm on labor-rate-driven t&e, seta, and mission-engineering competitions, so kbr is most beatable where evaluated price turns on the burdened rate. the cost and management load of an active corporate spin-off can push a competitor toward disciplined, margin-protective bidding rather than buy-ins, though kbr may also price aggressively to defend flagship incumbencies (nasa human spaceflight, redstone missile engineering) it cannot afford to lose before the separation. we hold no documented rate intelligence on kbr's government entities. (needs internal input: wrap-rate or evaluated-price observations from any shared competitions on astro, oasis+, seaport-nxg, amcom and redstone vehicles, or nasa services.) ### pp1 - scale and fy2025 financials kbr reported fy2025 (fiscal year ended january 2, 2026) revenue of about $7.79b (up 1%), net income attributable to kbr of $415m (up 11%), and adjusted ebitda of $968m (a 12.4% margin, up 12%), with diluted eps of $3.21 and adjusted eps of $3.93; it guided fy2026 to revenue of $7.90b-$8.36b and adjusted ebitda of $980m-$1,040m, and employs about 38,000 people across more than 29 countries [s1][s2]. ### pp2 - government (mts) segment and backlog kbr's mission technology solutions segment (the former government solutions business, renamed in a january 2025 realignment) generated about $5.581b of fy2025 revenue with $463m of operating income (up 12% from $415m in fy2024); total-company backlog and options were roughly $23.2b (about $16.9b firm), up 13% [s1][s2][s3]. ### pp3 - planned spin-off of the government business on september 24, 2025 kbr's board approved a plan to spin off mission technology solutions into a separate, publicly traded u.s. company (intended to be tax-free); the spun-off national-security-and-space company is described as entering the market with more than $5b in annual revenue and about 20,000 employees, while the remaining new kbr keeps the process-technology and sustainability business under ceo stuart bradie [s4]. ### pp4 - spin-off leadership and timeline on june 25, 2026 kbr named michael larouche president and ceo-designate of the spin-off company (joining september 24, 2026) and nicholas veasey cfo-designate (joining july 1, 2026); the new company's name and brand were still to be announced as of mid-2026, with the separation targeted for completion around january 4, 2027 [s5]. ### pp5 - lost the cosmos nasa recompete and two protests nasa awarded the $1.8b cosmos contract (contract for organizing spaceflight mission operations and systems, a five-year base plus options for johnson space center human-spaceflight mission operations, systems engineering, r&d, it, and technical services) to the ascend aerospace and technology joint venture; the award replaced the mission systems operations work kbr had held since its 2018 sgt acquisition. kbr protested, nasa took corrective action and re-awarded to the same team, and gao denied kbr's follow-on protest in early 2026 [s6][s15]. ### pp6 - imoc iii human-spaceflight contract in 2023 nasa awarded kbr imoc iii, worth up to $1.9b over a five-year base plus two two-year options, to provide mission planning, astronaut and mission control center flight-controller training, real-time flight execution, and exploration-vehicle design across jsc, marshall space flight center, and kennedy space center, supporting the iss, commercial crew, orion, sls, gateway, human landing system, and artemis [s8]. ### pp7 - flat government growth and contingency-revenue volatility kbr's mission technology solutions revenue rose only $26m year over year in fy2025 (to about $5.581b from $5.555b), and total-company fourth-quarter revenue fell 11% partly on reductions in eucom contingency scope, underscoring how much of kbr's near-term revenue movement comes from lumpy overseas contingency logistics rather than steady growth in its core engineering-services lanes; kbr remains an active contingency-logistics prime, having won a logcap v task order over an amentum parsons team whose protest gao dismissed [s1][s2][s7]. ### pp8 - nasa astronaut-health (hhpc) contract in august 2025 nasa awarded kbr the follow-on human health and performance contract, an estimated $2.459b single-award idiq (total value with options about $3.6b) beginning a five-year period of performance on november 1, 2025 with two option periods potentially extending to 2035, largely at johnson space center, covering astronaut health, occupational health, and human-spaceflight health research [s9]. ### pp9 - redstone army missile engineering and seta kbr wyle services llc performs army systems-engineering and technical-assistance work at redstone arsenal, including a cost-plus-fixed-fee seta task order for multiple air- and ground-launched weapon systems (digital transformation, program management, engineering, software, cybersecurity, and logistics) with a cumulative face value near $207.9m and completion in december 2031; earlier redstone awards include a $165m tactical-missile engineering task order for the peo missiles and space tagm project office (hellfire and jagm) and about $207m of patriot missile systems-engineering work [s11]. ### pp10 - linquest acquisition kbr acquired linquest corporation for $737m net (a $745m base price), closing in september 2024; linquest brought about 1,550 employees and space, air-dominance, and connected-battlespace engineering and integration for space force, air force, and intelligence customers, including ai and machine-learning work [s12]. ### pp11 - centauri acquisition kbr acquired centauri, llc for about $800m in cash (net of tax benefits) in october 2020, from arlington capital partners, expanding into military space, directed energy, cyber, and other advanced national-security technology [s13]. ### pp12 - wyle acquisition and t&e heritage kbr acquired wyle for $600m in july 2016, adding test and evaluation of aircraft, advanced systems, and networks, systems and sustainment engineering, program and acquisition management, life-science research, and space-medical operations; wyle had supported nasa since project gemini in the 1960s [s14]. ### pp13 - sgt acquisition kbr acquired stinger ghaffarian technologies (sgt) for a $355m base price in april 2018, adding nasa mission operations, engineering, scientific, and it services; this is the origin of the human-spaceflight mission-operations work later recompeted as cosmos [s15]. ### pp14 - frazer-nash acquisition kbr acquired uk and australia systems-engineering and advisory firm frazer-nash consultancy from babcock international for about \u00a3293m in october 2021, adding high-end systems engineering, systems assurance, and advisory across defense, energy, and critical infrastructure [s16]. ### pp15 - contract-vehicle access kbr holds eight prime seats on gsa astro (services for manned, unmanned, and optionally manned platforms and robotics, administered by gsa fedsim), and kbr wyle services holds oasis+ and seaport-nxg positions, pre-qualifying it on most large services task-order competitions [s17]. ### pp16 - marshall space flight center spaceflight operations (heritage) kbr (as kbrwyle) previously won a $570.3m nasa contract to develop and execute spaceflight operations at marshall space flight center in huntsville, placing it directly in our msfc anchor customer; this award dates to about 2019 and its current status should be verified before use in a specific pursuit [s10]. ### pp17 - leadership and executive changes stuart bradie is kbr's president and ceo (and chair-elect, slated to lead the remaining new kbr); byron bright, formerly president of government solutions u.s., became chief operating officer in may 2025; and shad evans succeeded mark sopp as cfo effect ices) - https://www.kbr.com/en/insights-news/press-release/kbr-wins-multiple-prime-seats-astro-contract and https://govtribe.com/vendors/wyle-laboratories-inc-dot-technical-support-services-9n030 (accessed 2026-07-17 via web search) - [s18] kbr leadership: stuart bradie (president and ceo, chair-elect; slated as new kbr chair/president/ceo post-spin); byron bright (coo effective may 2025, former president government solutions u.s.); mark sopp (cfo through jan 2026) succeeded by shad evans (cfo effective 2026-01-05; new kbr cfo post-spin) - kbr segment-realignment release, kbr press release, kbr form def 14a (2025) - https://investors.kbr.com/news-and-events/news/news-details/2025/kbr-announces-segment-realignment-and-executive-appointments-in-support-of-advancing-strategy/default.aspx and https://www.kbr.com/en/insights-news/press-release/kbr-announces-segment-realignment-and-executive-appointments-support-advancing-strategy and https://www.sec.gov/archives/edgar/data/1357615/000130817925000318/kbr_courtesy-pdf.pdf (accessed 2026-07-17 via web search)"}, {"slug": "leidos", "name": "Leidos", "tier": 1, "status": "draft", "stale": false, "age_days": 6, "relationship": "competitor", "markets": ["test-evaluation", "digital-engineering", "systems-engineering", "mission-engineering", "software-engineering", "rdte-support", "missile-defense", "sustainment-logistics", "enterprise-it", "cyber", "modeling-simulation", "c5isr", "space-operations", "autonomy", "aviation-engineering", "counter-uas"], "agencies": ["army", "army-devcom", "army-amcom", "usaf-afmc", "navsea", "dhs"], "vehicles": ["seaport-nxg", "rs3", "oasis-plus", "agency-idiq"], "owner": "CI Owner", "example": false, "last_reviewed": "2026-07-17", "search": "leidos leidos holdings, inc. leidos, inc. dynetics leidos holdings, inc. (reston, va) is among the largest us federal technology and services primes, with fy2025 revenue of roughly $17.2b, about 48,000 employees, and 87% of revenue from the us government [s1][s2]. as reported in its fy2025 10-k the company runs four segments (national security & digital, health & civil, commercial & international, defense systems); beginning fy2026 it realigned to intelligence & digital, health, homeland, and defense [s2][s5]. its scale came from consolidation: the 2013 saic separation (driven by systems-engineering conflict-of-interest limits), the 2016 purchase of lockheed martin's is&gs business (about $5b, roughly doubling the company), dynetics in 2020 ($1.65b), and gibbs & cox in 2021 [s6]. we rarely meet them on their enterprise-it franchises (disa dodnet, dhs, va, faa), but we collide directly where a defense-engineering services scope sits next to their footprint: air force sustainment and avionics test systems, army aviation and missile work at redstone through dynetics, digital modernization, and missile-defense architecture [s8][s9][s12][s15][s16]. dynetics puts leidos in our huntsville backyard with more than 3,000 engineers building hypersonic glide bodies, air-defense launchers, and missiles for the same devcom/avmc, amcom, and peo customers we support [s7][s8][s9]. on the large consolidated recompetes we bid or sub on, leidos is the default giant: a deep past-performance library, a full menu of vehicles (rs3, seaport-nxg, alliant 2, oasis+), and a balance sheet that recently absorbed kudu dynamics and a $2.4b energy-infrastructure acquisition [s17][s18][s19]. where we win is not scale. it is independence from their product baselines, mission focus, and a resident test-enterprise bench they do not staff everywhere they compete. leidos hurts us most as the low-risk default on very large, consolidated, multi-agency programs, and wherever dynetics-built hardware pulls the surrounding engineering work along with it. their marquee position is the roughly $11.5b, ten-year defense enclave services (des) program consolidating the dod fourth estate onto dodnet, a scope so large that scale and prior performance dominate the evaluation and squeeze mid-size primes out of the prime lane [s12]. at redstone they are not a distant competitor: dynetics holds the army common-hypersonic glide body ($670.5m), indirect fires protection capability (ifpc) launcher production, and related missile work, which gives leidos both hardware revenue and an engineering staff embedded in our core army aviation-and-missile customer base [s8][s9]. on the air force side they run f-16 avionics test-system and cloud one digital work, and they are positioning for a $4b to $5b slice of golden dome from their existing radar, sensing, counter-uas, and air-defense portfolio [s14][s15][s16]. where they seldom beat us is a focused, labor-driven test-and-evaluation, seta, or mission-engineering competition scored on dedicated key personnel, resident local presence, and independence from the systems under test, and their product/oem conflicts, portfolio sprawl, and recompete churn give us clean, scoreable discriminators. - scale and past-performance breadth. as one of the largest federal primes ($17.2b fy2025, about $48b backlog), they can carry consolidated, high-ceiling programs at low perceived risk, which is exactly what wins big enterprise recompetes [s1][s3]. - incumbency reach-back. entrenched positions across disa, dhs, va, faa, and dod give them existing accreditations, cleared staff, and enterprise relationships they pull into adjacent bids [s2][s12]. - dynetics vertical integration. they can both build the missile, hypersonic, and air-defense hardware and provide the surrounding engineering, attractive to a customer who wants one accountable prime for hardware plus integration [s7][s8][s9]. - full-spectrum digital and cyber. ai, offensive-cyber and electromagnetic-spectrum capability (bolstered by the kudu dynamics acquisition) plus digital-engineering and mbse marketing let them wrap a technology story around any defense program [s17][s24]. - vehicle and balance-sheet strength. positions on rs3, seaport-nxg, alliant 2, and oasis+, plus capital for capability acquisitions, keep them pre-qualified on most large task-order competitions [s18][s19]. - enterprise-it franchise scale: the roughly $11.5b, ten-year des program consolidates about 22 defense agencies onto dodnet (projected to reach roughly 370,000 users), a consolidated-recompete anchor they have defended through multiple gao protests [s12]. - redstone hardware plus engineering mass through dynetics: more than 3,000 people in huntsville producing the army common-hypersonic glide body and thermal protection ($670.5m, through october 2029), ifpc air-defense launchers, and missile components [s7][s8][s9]. - air force sustainment and cloud footprint: a $475m f-16 avionics product-support integration award covering automatic test systems, support equipment, and test program sets, plus an up-to-$987m aflcmc f-16 foreign-military-sales idiq and a $455m cloud one digital award [s14][s15]. - government concentration and backlog: 87% of fy2025 revenue from the us government and about $48.4b of total backlog give predictable reach-back and staffing depth [s2][s3]. - missile-defense positioning: management estimates $4b to $5b of near-term golden dome funding aligns with their radar, space-sensing, counter-uas, and air-defense portfolio [s16]. - digital modernization pipeline: recent disa awards including a $142m compartmented enterprise services (ceso) modernization and a $35m cross-domain enterprise services deal extend the enterprise-it base [s13]. - capital-backed capability growth: the $293m-$300m kudu dynamics acquisition (ai-enabled cyber) and the $2.4b entrust solutions group acquisition (energy infrastructure, about 3,100 staff) show a balance sheet that buys its way into new markets [s17][s18]. - vehicle access across services: prime positions on rs3 (army c4isr), seaport-nxg (navy), alliant 2 (gsa gwac), and oasis+ [s19]. ### w1 - product and oem conflicts on independent test and government-side engineering through dynetics, leidos builds the hardware it and others test: the army common-hypersonic glide body and thermal protection system, ifpc air-defense launchers, missiles, and related subsystems, alongside maritime autonomy and sensor work [s7][s8][s9]. on any scope that calls for independent test and evaluation, objective assessment, or government-side engineering advice touching those baselines, they carry an organizational-conflict-of-interest burden that a non-oem services prime does not. when the same company builds the glide body, the launcher, or the system under test, the government has to police a mitigation plan we never trigger, and the 2013 saic separation exists precisely because that conflict is real and hard to manage [s6]. ### w2 - prime-scale overhead and wrap rate on labor-driven competitions leidos is a $17.2b prime carrying corporate overhead, indirect structure, and shareholder margin expectations (fy2025 adjusted ebitda margin around 14%) [s1]. on engineering-services, seta, and test-enterprise competitions where evaluated price turns on the fully burdened labor rate rather than on hardware content or enterprise reach-back, a large prime's wrap is beatable by a focused mid-size firm. this is team judgment, not documented rate intelligence, but it is a repeatable pattern where the buy is dominated by direct labor. (needs internal input: any observed evaluated-price or wrap-rate data from shared task-order competitions.) ### w3 - portfolio sprawl and diverging strategic attention the northstar 2030 strategy pushes capital and management attention into energy infrastructure, commercial, and managed-health markets that are not the defense-engineering-services fight we are in [s4]. the $2.4b entrust acquisition doubled a roughly $600m energy-infrastructure business, and kudu added a commercial-flavored cyber line [s18][s17]. on a focused test-enterprise, digital-engineering, or redstone recompete, a dedicated engineering company can credibly argue that the customer's mission is a rounding error inside a diversified $17b-plus portfolio, while for us it is the core of the business. ### w4 - federal-budget turbulence and recompete/incumbency churn leidos is exposed to the same budget pressure it competes into: doge-driven contract terminations (about $56.5m reported), gsa reviews of consulting spend across leidos and nine other firms, and continuing-resolution and shutdown risk in fy2026 [s23]. incumbency is not guaranteed either: leidos moved to lay off 93 workers at its ashburn security operation as a roughly $100m cbp contract it held went to recompete [s22]. capture teams can frame continuity and low transition risk as real, scoreable criteria that a churned incumbent cannot simply assume. ### w5 - thin dedicated bench at the air force test enterprise relative to their mass their center of gravity is enterprise it (disa dodnet), health and civil programs, and dynetics hardware in huntsville, not a resident engineering-services bench at the air force test centers where our people sit [s12][s7]. their verified air force footprint near our lanes is sustainment and avionics test-system integration managed from reston, not staffed test-and-evaluation and seta presence embedded at the ranges [s15]. that geography is a scoreable gap wherever local, badged, on-site engineering support is valued. (needs internal input: confirm leidos and dynetics actual on-site headcount and active task orders at eglin, edwards, and across aftc before asserting a specific staffing gap in a proposal; note dynetics gives them genuine resident mass at redstone, so this argument is strongest at the usaf test centers, not at huntsville.) - lead with oem independence against w1. we build none of the missiles, glide bodies, launchers, or sensors under test, so our test planning, verification, and engineering advice carries no product agenda and no conflict-mitigation plan the customer has to audit. push evaluation language on objectivity, independence, and data rights wherever their hardware sits on the program. this is our single cleanest discriminator at redstone, where their local presence is strong but their independence is not. - force focused, labor-scored terms against w2 and w3. where the buy is dominated by direct engineering labor and dedicated key personnel, insist on fully burdened rate realism, named on-contract staff, and evidence that the customer's mission gets dedicated senior attention rather than a matrixed slice of a diversified portfolio. - sell continuity against w4. on recompetes, position low transition risk and stable, dedicated staffing against a prime whose incumbency has churned and whose portfolio is absorbing budget shocks and consulting-spend reviews. - win the local-bench argument against w5 at the usaf test centers. our people are badged and resident at aftc (eglin, edwards) and the redstone customer community today. make staffed local presence, on-site clearance density, and surge-in-place a scored factor where it applies, and be honest internally that at redstone the winning wedge against them is independence and focus, not proximity. - deconflict where dynetics is genuinely the oem. on hypersonics, air-defense, and missile hardware the winnable ground is the independent government-side engineering, test, and integration wrap, not the baseline. consider teaming or deconfliction there rather than a head-on prime bid. (needs internal input: any existing teaming, nda, or deconfliction history with leidos or dynetics business units.) - **they say:** \"leidos brings scale and reach-back a mid-size firm can't match.\" **we say:** scale spread across a $17b, multi-market portfolio is a staffing promise, not a staffing plan. ask every offeror what percentage of named key personnel are dedicated full time to this effort and resident at your site. that is the question a focused engineering team wins. - **they say:** \"dynetics already builds the hardware, so they understand the system.\" **we say:** that is exactly why the government keeps independent test and engineering separate from the company that manufactures the item. we give your program office an advocate with no product revenue at stake and inherit system knowledge through the artifacts and data you already own. - **they say:** \"they hold des and the big enterprise contracts, so they own this mission.\" **we say:** enterprise-it consolidation experience is not test-enterprise or mission-engineering delivery. score relevance at the size and services scope of this actual effort, not corporate breadth on unrelated programs. - **they say:** \"a large incumbent is the safe, low-risk choice.\" **we say:** ask what has changed on their side. recent recompete losses, workforce reductions, and budget-driven terminations make continuity a live question. a dedicated team with stable, named staff is the lower-risk path on a labor-driven scope. - \"how will the evaluation ensure that offerors who manufacture the hardware, munitions, or systems under test identify and mitigate organizational conflicts of interest, so the government preserves independent test and engineering advice?\" - \"what percentage of proposed key personnel will be dedicated full time and resident within commuting distance of the government site at contract start, rather than matrixed from a broad corporate portfolio?\" - \"how will offerors demonstrate continuity and transition-risk mitigation, given recent workforce reductions and recompete turnover among large incumbents?\" - \"how will cited past performance be checked for relevance at the size and services scope of this effort, as opposed to enterprise-it or hardware-integration heritage on much larger programs?\" - \"how will offerors show that this mission receives dedicated senior management attention, rather than being one line inside a diversified commercial-and-federal portfolio?\" ### g1 - independence from the manufacturing baseline - ghost: \"offerors should identify any organizational conflicts of interest arising from their ownership or manufacture of the hardware, munitions, or systems relevant to this effort, and describe how their mitigation approach preserves objective, independent test, evaluation, and engineering advice to the government throughout the period of performance.\" - targets: w1 - proof: pp4 ### g2 - continuity and transition risk on recompete - ghost: \"offerors should describe how they will ensure continuity and stability of engineering support across the full period of performance, including dedicated, named key personnel and a transition approach that mitigates risk where prior efforts have experienced workforce turnover or reduction.\" - targets: w4 - proof: pp12 ### g3 - dedicated mission focus - ghost: \"offerors should demonstrate how this effort will receive dedicated senior management attention and committed resources, rather than being supported as a minor element of a large, diversified commercial and federal portfolio, and how that focus is reflected in staffing, governance, and reach-back.\" - targets: w3 - proof: pp11 ### g4 - resident engineering presence at the government test site - ghost: \"offerors should demonstrate an established, currently staffed engineering presence at or near the government test site, including resident headcount, cleared personnel on site, and facilities available at contract start, rather than reliance on a distributed corporate footprint managed from a remote headquarters.\" - targets: w5 - proof: pp2 facts: leidos is a roughly $17.2b prime running an adjusted ebitda margin near 14%, with its highest-margin work in managed-health and civil services (health & civil non-gaap operating margins in the low-to-mid 20% range in fy2025 commentary) rather than in labor-driven defense engineering [s1][s23]. judgment, labeled as such: a prime of this size typically wraps higher than a focused mid-size services firm on labor-rate-driven test, seta, and mission-engineering competitions, so they are most beatable where evaluated price turns on the burdened rate rather than on hardware content or enterprise reach-back. expect them to price most aggressively on large consolidated enterprise buys where scale, backlog, and past performance let them absorb margin pressure, and where dynetics hardware programs can subsidize adjacent engineering. we hold no documented rate intelligence on their engineering-services entities. (needs internal input: wrap-rate or evaluated-price observations from any shared competitions on rs3, seaport-nxg, amcom/redstone vehicles, or the air force test enterprise.) ### pp1 - scale, government concentration, and backlog leidos reported fy2025 (fiscal year ended january 2, 2026) revenue of about $17.2b with roughly $17.5b in net bookings, and raised fy2026 revenue guidance to $18.0b-$18.4b; the company employs about 48,000 people and is headquartered in reston, va [s1][s3]. in its fy2025 10-k, leidos states that 87% of fy2025 revenue came from the us government across the army, navy, air force, space force, intelligence agencies, disa, dhs, faa, tsa, cbp, va, dha, and others [s2]. ### pp2 - des/disa flagship consolidation program leidos holds the defense enclave services (des) program, an approximately $11.5b, ten-year disa award to consolidate the dod fourth estate onto the modernized dodnet, spanning about 22 defense agencies and field activities and projected to support roughly 370,000 users; leidos has defended the award and follow-on task orders through gao protest challenges [s12]. ### pp3 - dynetics huntsville hardware and engineering mass dynetics, a leidos company headquartered in huntsville, al, employs more than 3,000 people and operates research, development, and manufacturing facilities at redstone, embedding leidos in the army aviation-and-missile customer community where our test and engineering work is performed [s7]. ### pp4 - army common-hypersonic glide body dynetics received a $670.5m cost-plus-fixed- tomers. it is backed by the multibillion-dollar, roughly seven-year 1lmx model-based-enterprise transformation across ~122,000 employees [s7][s8]. ### pp11 - developmental-test and skunk works footprint at our aftc anchor sites lockheed conducts f-35 developmental flight testing through the integrated test force at edwards afb and nas patuxent river, and operates its advanced development programs (skunk works) at u.s. air force plant 42 in palmdale, ca, adjacent to edwards, an oem presence embedded in the aftc test enterprise where we support the government side [s17]. ### pp12 - space growth via terran orbital; minor aeronautics divestiture (2024) lockheed closed its acquisition of terran orbital on october 30, 2024 (~$314m purchase consideration, ~$450m enterprise value) into the space segment, adding small-satellite design, production, mission operations, and on-orbit support; separately it sold its aeronautics commercial engine solutions business in september 2024 for $170m [s15][s16]. ### pp13 - leadership jim taiclet is chairman, president and ceo (president and ceo since june 2020, chairman since march 2021) [s4]. evan scott became cfo in april 2025, a 26-year lockheed finance veteran and former missiles and fire control cfo, succeeding jay malave, who left for boeing [s5]. - 2026-01 - fy2025 results: $75.0b sales (up 6%), record $194b backlog, $5.0b net earnings; delivered a record 191 f-35s in 2025, clearing the tr-3 backlog [s2][s10]. - 2025-05 - gao denied lockheed's oci protest of the air force's toc-l award to saic (~$293m) [s14]. - 2025-04 - evan scott named cfo, succeeding jay malave (who left for boeing) [s5]. - 2024-10 - closed the terran orbital acquisition (~$450m enterprise value) into the space segment [s15]. - 2024-09 - sold the aeronautics commercial engine solutions business for $170m [s16]. - 2024-07 - f-35 delivery halt lifted with a truncated tr-3 build; all 110 jets delivered in 2024 were late (avg 238 days) [s10]. - 2024-04 - mda selecte /lockheed-hit-by-2b-in-charges-on-two-classified-programs/ and https://www.stocktitan.net/news/lmt/lockheed-martin-reports-fourth-quarter-and-full-year-2024-financial-8p52h9iythbe.html and https://www.airandspaceforces.com/secret-lockheed-program-lose-1-billion/ (accessed 2026-07-17 via web search)"}, {"slug": "parsons", "name": "Parsons Corporation", "tier": 2, "status": "draft", "stale": false, "age_days": 6, "relationship": "competitor", "markets": ["missile-defense", "space-operations", "cyber", "electronic-warfare", "systems-engineering", "mission-engineering", "modeling-simulation", "digital-engineering", "c5isr", "rdte-support", "seta-advisory"], "agencies": ["mda", "ussf-ssc", "dtra", "socom", "army"], "vehicles": ["astro", "agency-idiq"], "owner": "CI Owner", "example": false, "last_reviewed": "2026-07-17", "search": "parsons corporation parsons psn parsons corporation (chantilly, va; nyse: psn; founded 1944) is a publicly traded defense, intelligence, and infrastructure engineering firm reporting $6.4b fy2025 revenue and about 19,000 employees, split roughly in half between a federal solutions segment (~$3.2b) and a critical infrastructure segment (~$3.14b) [s1][s2][s17]. we do not collide with the infrastructure half (transportation, water, environmental, and a large middle east program-management business), so this card is about their federal solutions defense and national-security work [s12]. the collision is concentrated and real: parsons is the missile defense agency's systems-engineering-and-integration contractor through the seven-year, up-to-$2.24b teams-next award, and in december 2025 it won a seat on shield, the 10-year, $151b-ceiling mda idiq that succeeds teams and underpins the golden dome architecture [s4][s5]. that work sits in our huntsville backyard: parsons opened a 27,000-sq-ft facility at redstone gateway (outside gate 9) with a 21,000-sq-ft high-bay expressly to fast-track golden dome and missile-defense program support, next to the mda and army missile-defense community we support [s6]. beyond missile defense they are building fast in space (a $185m space force situational-awareness contract), cyber (a $137m dtra task order; a sealingtech joint cyber hunt kit production line uscybercom values up to $500m), and electronic warfare and sigint, largely through a run of acquisitions (blacksignal, chesapeake/cti, altamira) [s7][s8][s9][s10]. where we meet them is missile-defense engineering and integration, space services, and cyber/ew at redstone and the space force; where we do not is their infrastructure segment, their intelligence-community accounts, and their international footprint. our edge is a resident, badged test-and-evaluation and mission-engineering bench at the ranges and a focused business, against a $6.4b multi-market prime that grows by acquisition and just absorbed a several-hundred-million-dollar revenue shock from one confidential program [s1][s3]. parsons hurts us most in the missile-defense engineering-and-integration lane, where they are the sitting mda systems-engineering incumbent (teams-next, up to $2.24b) and now hold a shield seat on the $151b vehicle that will carry much of the golden dome work at redstone [s4][s5]. their new high-bay facility at redstone gateway signals intent to be physically resident in our huntsville missile-defense community, not to compete from a distance [s6]. they are also arming quickly in the adjacent lanes we touch: space situational awareness for the space force, dtra cyber operations, and an acquisition-fueled electronic-warfare, sigint, and cyber-kit portfolio that lets them wrap a full-spectrum national-security story around a bid [s7][s8][s9][s10]. where they seldom beat us is a focused, labor-driven test-and-evaluation, mission-engineering, or seta competition scored on resident on-site key personnel and independence, because parsons' center of gravity is centralized se&i, intelligence, and a very large infrastructure business, and because a single confidential state department program swinging their revenue by hundreds of millions, a serial-acquisition integration load, and two recent recompete or eligibility stumbles all give us clean, scoreable discriminators [s3][s10][s13][s14]. - mda systems-engineering incumbency. parsons holds the mda systems-engineering-and-integration seat (teams-next, up to $2.24b) and a shield position, which makes them the vendor-agnostic integrator the customer already trusts for the layered missile-defense architecture, a hard position to dislodge on any adjacent missile-defense scope [s4][s5]. - golden dome alignment and huntsville presence. their existing mda role plus a purpose-built redstone gateway high-bay facility position them as an early, resident golden dome player rather than a newcomer [s5][s6]. - full-spectrum national-security breadth. cyber (offensive and defensive), electronic warfare, sigint, and space, assembled through acquisitions, let them offer one accountable prime across the mission set on a large program [s8][s9][s10]. - scale and balance sheet. a $6.4b, ~19,000-person public prime with record adjusted ebitda and an active m&a engine (2-4 deals a year) can carry large, high-ceiling programs at low perceived risk and buy its way into new capability quickly [s1][s16]. - space software and pnt franchises. a government-owned situational-awareness software suite and assured-pnt heritage give them installed positions the space force customer already runs [s7]. - mda se&i incumbency: the seven-year, up-to-$2.24b teams-next award makes parsons mda's systems-engineering-and-integration contractor, delivering vendor-agnostic engineering analysis and modeling and simulation for an integrated, layered missile-defense system [s4]. - shield / golden dome position: a 10-year seat on the $151b mda shield idiq, covering roughly 19 technical and engineering activities supporting the golden dome architecture, positions them for the highest-growth missile-defense spend of the decade [s5]. - resident huntsville footprint: a new 27,000-sq-ft redstone gateway facility (21,000 sq ft of high-bay) built to fast-track golden dome development, test, and deployment work next to mda [s6]. - space services: a $185m five-year space force contract expanding a government-owned integrated situational-awareness software suite, plus space domain awareness, space c2, and assured-pnt capability [s7]. - cyber and ew depth from acquisitions: dtra cyber operations ($137m aemss task order), a sealingtech joint cyber hunt kit production line uscybercom values up to $500m, plus blacksignal (ew, counter-space rf), cti (electromagnetic warfare, sof/indopacom), and altamira (sigint, missile warning, space) [s8][s9][s10]. - financial scale and momentum: $6.4b fy2025 revenue, record adjusted ebitda of $609m at a 9.6% margin, net income $241m, 100% free-cash-flow conversion, and an m&a engine targeting 2-4 deals in 2026 [s1][s16]. - contract-vehicle access: positions on astro and alliant 2, plus agency idiqs including teams-next, shield, and dtra aemss [s19]. - diversified base: a ~$3.14b critical infrastructure segment (+14.6% in fy2025) and a $1b-plus middle east business give revenue that is not dependent on any single defense budget line [s2][s12]. ### w1 - revenue concentration and volatility from one confidential program a single confidential state department program (program management and technology services, 10-year, then in year three) swung parsons' revenue by hundreds of millions when the 2025 state reorganization eliminated the program office: the contract ran at ~80% of volume in q1 2025, ~50% in q2, and was essentially zeroed for the rest of the year, driving federal solutions down 20% to ~$3.2b and carrying a ~$345m revenue headwind into 2026 [s3][s2][s16]. that fragility is the opposite of the steady, dedicated engineering base a customer wants on a mission-critical recompete, and it is documented in their own guidance revisions. ### w2 - serial-acquisition roll-up: integration, culture, and debt load much of parsons' federal capability is bolted on, not grown: nine of eleven strategic acquisitions since 2017 sit in federal solutions, and 2023-2026 alone brought sealingtech, blacksignal ($203.8m), cti ($89m), and altamira (up to $375m), with management targeting 2-4 more deals in 2026 [s10][s11][s16]. a roll-up at that pace carries integration risk, cultural churn, retention risk on acquired key personnel, and goodwill and leverage on the balance sheet. on a focused engineering recompete a customer can reasonably ask whether the team executing is a stable, integrated organization or a recently assembled set of logos still being merged. ### w3 - half the company, and much management attention, is infrastructure and international about half of parsons' revenue is the critical infrastructure segment (~$3.14b), and a $1b-plus slice of that is middle east transportation and giga-project work (neom, the ~$7b king salman international airport) that is not the defense-engineering-services fight we are in [s12][s2]. on a focused missile-defense, test-and-evaluation, or mission-engineering competition, a dedicated engineering company can credibly argue that the customer's mission is one line inside a diversified, half-civil, heavily international portfolio, while for us it is the core of the business. ### w4 - centralized se&i model, not a resident test-and-evaluation and seta bench at the ranges parsons' defense center of gravity is centralized systems-engineering-and-integration, intelligence, and space software, delivered largely as an mda integrator and through acquired product lines, rather than a badged, on-site test-and-evaluation and seta workforce embedded at the air force test centers and army ranges where our people sit [s4][s7]. their verified new physical presence is a redstone gateway program-support facility oriented to golden dome, not a distributed range-and-test-enterprise bench at eglin, edwards, or the army test community [s6]. that geography is a scoreable gap wherever local, on-site engineering and t&e presence is valued. (needs internal input: confirm parsons' actual on-site headcount and active task orders at aftc (eglin, edwards), at redstone, and across the army test enterprise before asserting a specific staffing gap in a proposal; note their redstone gateway facility gives them genuine, growing local presence for missile-defense program support, so this argument is strongest at the usaf test centers and in staffed t&e, not blanket at huntsville.) ### w5 - recent recompete and eligibility stumbles parsons does not always win, and has stumbled on the mechanics: gao denied its protest after it lost a gsa alliant 2 cyber task order to mantech, which the agency found technically superior (decision posted november 2024), and gao dismissed the amentum-parsons logcap v protest for lack of standing after finding the joint venture's proposal internally inconsistent on a material requirement and therefore ineligible for award (september 2025) [s13][s14]. capture teams can frame proposal discipline, technical relevance, and eligibility as live, scoreable risks a large incumbent cannot simply assume away. ### w6 - prime-scale overhead on labor-driven competitions parsons is a $6.4b prime carrying corporate overhead, indirect structure, and shareholder margin expectations (record fy2025 adjusted ebitda margin of 9.6%) [s1]. on engineering-services, seta, and test-and-evaluation competitions where evaluated price turns on the fully burdened labor rate rather than on program scale or a proprietary kit, a large multi-market prime's wrap is beatable by a focused mid-size firm. this is team judgment, not documented rate intelligence. (needs internal input: any observed evaluated-price or wrap-rate data from shared task-order competitions at mda, the space force, or the army/usaf test enterprise.) - win the resident-bench argument against w4. our people are badged and resident at the air force test enterprise (aftc: eglin, edwards) and across the redstone army missile-and-aviation community today. make staffed local presence, on-site clearance density, and surge-in-place a scored factor where it applies, and be honest internally that at redstone their new facility gives them real, growing proximity, so the sharpest wedge there is focus and dedicated t&e, not simple geography. - sell continuity and stability against w1 and w2. on any recompete, position steady, dedicated, integrated staffing against a prime whose revenue just took a several-hundred-million-dollar hit from one program and whose federal capability is a fast-moving roll-up of recently acquired companies still being merged. - force focused, labor-scored terms against w3 and w6. where the buy is dominated by direct engineering labor and dedicated key personnel, insist on burdened-rate realism, named on-contract staff, and evidence that the customer's mission gets dedicated senior attention rather than a matrixed slice of a half-civil, heavily international $6.4b portfolio. - respect the mda incumbency, then compete around it. their teams/shield se&i seat is a genuine strength; do not bid head-on into their integrator role. compete for the discrete engineering, test, mission-engineering, and analysis scopes where dedicated key personnel and independence outscore integrator incumbency, and consider teaming or deconfliction where they hold the se&i baseline. (needs internal input: any existing teaming, nda, or deconfliction history with parsons on mda or space force work.) - use their proposal stumbles against w5. on competitions where they are favored, plant relevance-of-past-performance and eligibility discipline as evaluation themes, and make sure our own compliance is airtight so the mechanics cut our way. - **they say:** \"parsons already runs mda systems engineering, so they know the missile-defense architecture.\" **we say:** systems-engineering-and-integration incumbency is exactly why the government wants independent, dedicated engineering and test talent around it. score this effort on the named key personnel who will actually do the work and their resident presence, not on a corporate integrator relationship on a different contract. - **they say:** \"they bring scale and a full national-security portfolio a mid-size firm can't match.\" **we say:** scale spread across a half-civil, heavily international $6.4b portfolio is a staffing promise, not a staffing plan. ask every offeror what percentage of named key personnel are dedicated full time to this mission and resident at your site. - **they say:** \"parsons has been buying the best cyber, ew, and space capabilities.\" **we say:** acquired capability is only as good as its integration and retention. ask offerors to show the team on this effort is a stable, integrated organization with committed key personnel, not a recently merged set of companies still finding its footing. - **they say:** \"a large public prime is the safe, low-risk choice.\" **we say:** ask what has changed on their side. a single confidential program just swung their revenue by hundreds of millions, and recent recompete and eligibility rulings show incumbency and award are not automatic. a focused team with stable, dedicated staff is the lower-risk path on a labor-driven scope. - \"what percentage of proposed key personnel will be dedicated full time and resident within commuting distance of the government site at contract start, rather than matrixed from a broad, multi-market corporate portfolio?\" - \"how will the evaluation confirm that an offeror's cited experience was performed by the team and personnel proposed here, rather than inherited from recently acquired companies still being integrated?\" - \"how will offerors demonstrate continuity and financial stability of the delivering organization across the full period of performance, including resilience to revenue swings on unrelated large programs?\" - \"how will past performance be checked for relevance at the size and services scope of this actual effort, as opposed to systems-engineering-integration or infrastructure heritage on much larger or unrelated programs?\" - \"how will offerors demonstrate independent, objective engineering and test judgment where the same firm also supplies proprietary hardware, kits, or integration baselines in the mission area?\" ### g1 - continuity and stability of the delivering organization - ghost: \"offerors should demonstrate the financial stability and continuity of the specific organization that will deliver this effort, including resilience to revenue or staffing disruption on unrelated programs, and describe how dedicated, named key personnel will provide uninterrupted support across the full period of performance.\" - targets: w1 - proof: pp5 ### g2 - dedicated mission focus over a diversified portfolio - ghost: \"offerors should demonstrate how this effort will receive dedicated senior management attention and committed engineering resources, rather than being supported as a minor element of a large, diversified commercial, international, and federal portfolio, and how that focus is reflected in staffing, governance, and reach-back.\" - targets: w3 - proof: pp10 ### g3 - integrated, stable team over recently assembled capability - ghost: \"offerors should show that the personnel and past performance proposed reflect a stable, integrated delivery organization, and should identify where proposed capabilities or experience derive from recently acquired entities, describing how integration and key-personnel retention risks are mitigated for this effort.\" - targets: w2 - proof: pp9 ### g4 - resident, on-site engineering and test presence - ghost: \"offerors should demonstrate an established, currently staffed engineering and test presence at or near the government site, including resident headcount, cleared personnel on site, and facilities available at contract start, rather than reliance on a centralized systems-integration construct managed from a remote corporate location.\" - targets: w4 - proof: pp2 facts: parsons is a ~$6.4b prime that posted a record fy2025 adjusted ebitda margin of 9.6% and 100% free-cash-flow conversion, roughly half of company revenue coming from a critical infrastructure segment that carries different margin dynamics than labor-driven defense engineering [s1][s2]. judgment, labeled as such: a multi-market prime of this size typically wraps higher than a focused mid-size services firm on labor-rate-driven test, seta, and mission-engineering competitions, so they are most beatable where evaluated price turns on the burdened rate rather than on program scale or a proprietary product/kit. expect them to price most aggressively where scale, an installed se&i or software franchise, or a growth priority (golden dome, space, cyber kits) justifies leaning in, and to protect margin on labor-only recompetes. we hold no documented rate intelligence on their engineering-services entities. (needs internal input: wrap-rate or evaluated-price observations from any shared competitions at mda, the space force, dtra, or the usaf/army test enterprise.) ### pp1 - scale, segments, and workforce parsons reported fy2025 (year ended 2025-12-31) revenue of $6.4b, record adjusted ebitda of $609m at a 9.6% margin, net income of $241m, and diluted eps of $2.20, with 100% free-cash-flow conversion; the company employs about 19,000 people and is headquartered in chantilly, va [s1][s17]. ### pp2 - mda teams-next systems engineering the missile defense agency awarded parsons the teams-next systems engineering contract, a seven-year vehicle valued up to $2,241,762,696 (contract hq085821c0015), under which parsons serves as mda's systems-engineering-and-integration contractor, delivering vendor-agnostic engineering analysis and modeling and simulation for an integrated, layered missile-defense system [s4]. ### pp3 - mda shield p9 - acquisition roll-up in defense and intelligence parsons has assembled much of its federal capability by acquisition: blacksignal technologies (2024, $203.8m; ew, counter-space rf, cyber), chesapeake technology international (2025, $89m, ~225 employees; electromagnetic warfare, sof/indopacom), and altamira technologies (announced 2026-01-15, up to $375m; 600+ employees, 90%+ cleared; sigint, missile warning, space), on top of sealingtech (2023, $179.3m); nine of eleven strategic acquisitions since 2017 sit in federal solutions, with 2-4 more targeted in 2026 [s10][s11]. ### pp10 - half the company is infrastructure and international parsons' critical infrastructure segment posted ~$3.14b in fy2025 revenue (+14.6%); its middle east business alone carried more than $1b in annual revenue in 2024 with ~7,000 gcc employees, including neom and a jv role on the ~$7b king salman international airport program in riyadh, none of it in the defense-engineering-services fight [s12][s2]. ### pp11 - alliant 2 cyber loss and denied protest gao denied parsons' protest (decision posted 2024-11-21, b-422849) after it lost a gsa alliant 2 cyber task order to mantech, which the agency found technically superior; gao rejected parsons' claim that mantech gained an unfair advantage by hiring a former navy principal cyber adviser [s13]. ### pp12 - logcap v joint-venture ineligibility gao dismissed the amentum-parsons logcap v protest for lack of standing (2025-09-18, b-422697.14), finding the joint venture's proposal internally inconsistent on a material requirement and therefore ineligible for award [s14]. ### pp13 - fy2026 guidance and drivers fy2026 guidance assumes ~6.6% organic growth in federal solutions and ~6.1% in critical infrastructure, absorbs the ~$345m confidential-contract headwind, and depends on a second-half ramp from jchk production and riyadh infrastructure; q1 2026 revenue was $1.5b (down 8% organic, up 8% excluding the confidential contract) [s16]. ### pp14 - leadership carey a. smith is chair (since 2022-01-18), president, and ceo (since 2021-07-01); matt ofilos is cfo (since 2022-07-25, formerly aws worldwide public sector and raytheon); the board added ellen lord (former usd for acquisition & sustainment) in 2022; the company moved its headquarters to chantilly, va in 2023 [s15]. ### pp15 - contract-vehicle access parsons holds a position on astro (multiple-award idiq, 10-year period beginning 2021-11-15) and alliant 2 (gwac, under parsons government services inc.), plus agency idiqs including mda teams-next, mda shield, and dtra aemss [s19]. - 2026-01 - announced the acquisition of altamira technologies (up to $375m; 600+ cleared employees; sigint, missile warning, space) for the defense & intelligence business unit [s10]. - 2026-q1 - reported q1 2026 revenue of $1.5b (down 8% organic, up 8% excluding the confidential contract) and reaffirmed fy2026 organic-growth guidance, with a second-half ramp expected from jchk production and riyadh work [s16]. - 2025-12 - won a seat on the 10-year, $151b mda shield idiq supporting the golden dome architecture, succeeding teams [s5]. - 2025 - opened the redstone gateway facility in huntsville to fast-track golden dome and missile-defense program support [s6]. - 2025-07 - acquired chesapeake technology international ($89m; electromagnetic warfare, sof/indopacom) [s10]. - 2025-06 - won a $137m dtra cyber-operations task order under aemss [s8]. - 2025-h1 - confidential state department program zeroed out after the state reorganization, cutting federal solutions revenue and creating a ~$345m 2026 headwind [s3]. - 2024-11 - gao denied parsons' protest of a mantech win on a gsa alliant 2 cyber task order [s13]. - 2024-08 - closed the blacksignal technologies acquisition ($203.8m; ew, counter-space rf, cyber) [s10]. - [s1] parsons fy2025 full-year results (revenue $6.4b; down 9% organic, +12% total / +8% organic excluding the confidential contract; record adjusted ebitda $609m at 9.6% margi  (science applications international corporation, reston va) is a roughly $7.3b, ~24,000-person federal technology integrator running two segments, defense and intelligence and civilian [s1][s2]. it is the \"new saic\" spun off in 2013 when the old saic renamed itself leidos and distributed this business to shareholders, a separation driven explicitly by organizational-conflict-of-interest limits on systems-engineering work [s24]. scale since came from the 2019 engility acquisition ($2.5b, which roughly doubled its intelligence and space revenue) and the 2020 unisys federal purchase ($1.2b of enterprise it) [s23]. we collide with saic across most of our core lanes, but the sharpest overlap is at redstone, where saic holds two large devcom avmc s3i awards for modeling-and-simulation systems engineering ($800m) and hardware-in-the-loop and m&s development ($3.6b), plus amcom express and software engineering directorate heritage [s10][s11][s12]. on the air force side we meet them in digital engineering and prototyping (hope 2.0 tencap, $928m; cobra cjadc2, $1.4b) rather than at the aftc ranges, where we found no evidence of a resident saic bench [s13][s14]. they are also in our space and navy-test adjacencies through space force ground-radar sustainment (gmass, $574m), sda program integration, and a navy propulsion-test-facility contract [s15][s17]. the strategic backdrop matters: saic ousted its ceo in october 2025, installed former leidos cfo jim reagan, reorganized five business groups into three, and declared a pivot away from commodity enterprise it toward mission it and engineering, all while revenue is contracting [s6][s7][s8]. where we win is not scale. it is resident test-enterprise presence, independence, mission focus, and stability against a competitor mid-reorganization and losing incumbent recompetes. saic hurts us most at redstone and on large multi-domain digital-engineering and m&s buys, where it is an entrenched incumbent with directly relevant past performance and a full menu of vehicles. its avmc s3i positions ($800m and $3.6b, both run through gsa oasis and army contracting command-redstone) put saic people inside the aviation and missile center software, simulation, and systems-engineering directorate we support, doing live-virtual-constructive m&s, mbse, missile-defense and multi-domain system-of-systems work [s10][s11]. its 2025 wins (hope 2.0 rapid-prototyping mission engineering for af tencap, cobra digital engineering for cjadc2) show a company positioning as the fast, all-domain prototyping integrator, which is the same story we tell in digital and mission engineering [s13][s14]. where saic seldom beats us is a focused, labor-driven test-and-evaluation, seta, or range-enterprise competition scored on dedicated key personnel resident at the government site and independence from the systems under test. and saic is beatable right now on continuity: it is shrinking (fy2026 revenue down ~3%, fy2027 guided to further decline), churning leadership and structure, and losing incumbent recompetes it once held, giving us clean, scoreable discriminators on stability, focus, and local presence [s3][s6][s18]. - redstone incumbency in m&s and systems engineering. the avmc s3i awards give saic deep, current avmc past performance and an embedded engineering staff in the exact directorate and customer community we serve [s10][s11]. - all-domain rapid-prototyping brand. hope 2.0 (af tencap) and cobra (cjadc2) let saic market a \"concept to combat\" prototyping and mission-integration story across air, land, sea, space, and cyber [s13][s14]. - scale and vehicle breadth. a ~$7.3b integrator with ~$24b backlog, positions on oasis+, legacy oasis, amcom express, and gsa mas, and past performance that pre-qualifies it on most large task-order competitions [s3][s28]. - space and intelligence heritage from engility. space force ground systems, sda program integration, and ic mission work that saic pulls into adjacent bids [s15][s16][s23]. - ai and cyber positioning. the silveredge acquisition adds agentic-ai and cyber capability (soar, mynai) that saic wraps around mission-it and national-security programs [s21]. - redstone avmc entrenchment: a $3.6b, eight-year hardware-in-the-loop and m&s development award and an $800m m&s systems-engineering award, both for the devcom avmc s3i directorate, performed primarily in huntsville [s10][s11]. - air force digital-engineering and prototyping momentum: hope 2.0, a $928m five-year af tencap rdt&e mission-engineering contract for near-program-of-record prototypes across ~65 agencies and commands [s13]. - multi-domain c2 franchise: cobra, a $1.4b five-year task order to accelerate cjadc2 modernization through digital engineering, rapid prototyping, test, and modeling-and-simulation [s14]. - space footprint: gmass, a $574m space systems command ground-based radar maintenance and sustainment contract (uewr and parcs radars, colorado springs, through march 2030), a $390m systems-engineering-and-integration task order, and sda pwsa tranche 3 program integration [s15]. - navy test and hardware: a navy propulsion-test-facility operate-maintain-upgrade contract and mk48 mod 7 heavyweight-torpedo production (up to ~$1.1b), adding navy t&e-adjacent and hardware content [s17]. - backlog and cash: ~$23.8b backlog, book-to-bill above 1.0, and strong free cash flow support staffing depth and reach-back [s5]. - vehicle access: oasis+ unrestricted (awarded december 2024), legacy gsa oasis, amcom express bpa, and gsa mas [s28]. - portfolio sharpening: the silveredge acquisition (ai and cyber) and the earlier divestiture of the logistics and supply-chain business signal deliberate concentration on higher-value engineering and mission it [s21][s22]. ### w1 - growing conflict exposure where saic builds or integrates what others must independently assess saic increasingly produces and integrates the systems around which independent test and government-side engineering advice is given: mk48 mod 7 torpedo hardware for the navy and cjadc2 command-and-control integration and prototyping under cobra [s17][s14]. on any scope that calls for independent t&e, objective assessment, or government-side engineering touching those baselines, saic carries an organizational-conflict-of-interest question that a non-building services prime does not. the irony is documented: this very company exists because the old saic had to split off its systems-engineering business in 2013 to escape exactly these conflicts, and that separation reportedly unlocked nearly $25b of previously blocked addressable market [s24]. ### w2 - prime-scale overhead and wrap on labor-driven competitions saic is a ~$7.3b prime carrying corporate overhead, indirect structure, and shareholder-margin expectations (fy2026 adjusted ebitda margin ~9.7%) [s3]. on engineering-services, seta, and test-enterprise competitions where evaluated price turns on the fully burdened labor rate rather than on scale or hardware content, a large prime's wrap is beatable by a focused mid-size firm. this is team judgment rather than documented rate intelligence, but it is a repeatable pattern where the buy is dominated by direct labor. (needs internal input: any observed evaluated-price or wrap-rate data from shared task-order competitions, especially on redstone oasis/express work.) ### w3 - shrinking top line and procurement-delay exposure saic is contracting. fy2026 revenue fell ~3% to $7.26b, and management set initial fy2027 guidance to a further 2-4% decline, explicitly attributing the cut to procurement delays and unfavorable customer award decisions [s3]. it is simultaneously walking away from ~10% of its revenue base in commodity enterprise it as part of the mission-it pivot [s8]. a shrinking, repositioning competitor is one whose promised reach-back and investment on any single program deserve scrutiny, and whose \"safe incumbent\" narrative is weaker than its size suggests. ### w4 - losing incumbent recompetes and protests saic's incumbency is not holding. it lost the $1.4b castle-net recompete for army corps of engineers it to accenture federal services and had its gao protest denied in may 2026, despite having been the incumbent under the predecessor task order since 2021 [s18]. separately, the air force excluded saic (again the incumbent) from a $972m modeling-and-simulation competition on self-scoring, and gao denied saic's protest in july 2025 [s19]. trade reporting has saic dropping to roughly 11th among federal contractors after losing a major dod it vehicle recompete and divesting non-core lines [s20]. continuity and low transition risk are live, scoreable criteria a churned incumbent cannot simply assume. ### w5 - leadership and structure in flux saic removed ceo toni townes-whitley \"without cause\" in october 2025 after two years, installed former leidos cfo jim reagan (interim, then permanent in february 2026), and consolidated five business groups into three effective january 2026 [s6][s7]. a company changing its chief executive and its entire operating structure while redefining its portfolio around \"mission it\" is one whose senior attention and account continuity are legitimately in question on a multi-year program [s8]. we can credibly argue that our customer's mission gets steadier, more senior attention from a focused firm than from one mid-reorganization. ### w6 - thin resident presence at the air force test enterprise saic's air force center of gravity is tencap and cjadc2 prototyping and mission integration (hope 2.0, cobra), and its space work is space systems command ground-radar sustainment and sda program integration [s13][s15]. we found no evidence of a resident, badged saic test-and-evaluation bench at aftc (eglin, edwards) where our people sit. that geography is a scoreable gap wherever local, on-site, cleared engineering support is valued. (needs internal input: confirm saic's actual on-site headcount and active task orders across aftc before asserting a specific staffing gap in a proposal; their redstone presence is genuinely strong, so this argument is strongest at the usaf test centers, not at huntsville.) - lead with independence against w1. we build no torpedoes, no c2 baselines, and no systems under test, so our test planning, verification, and engineering advice carries no product agenda and no conflict-mitigation plan the customer has to police. push evaluation language on objectivity, independence, and data rights wherever their hardware or integration sits on the program. - force focused, labor-scored terms against w2. where the buy is dominated by direct engineering labor and dedicated key personnel, insist on burdened-rate realism and named on-contract staff so a prime wrap cannot hide behind scale. - sell stability and continuity against w3, w4, and w5. position steady, dedicated staffing and low transition risk against a competitor that is shrinking, mid-reorganization, on its second ceo in a year, and losing incumbent recompetes. make \"who has actually held their programs through change\" a live question. - win the local-bench argument against w6 at the usaf test centers. our people are badged and resident at aftc (eglin, edwards) today. make staffed local presence, on-site clearance density, and surge-in-place a scored factor where it applies, and be honest internally that at redstone the winning wedge is independence and focus, not proximity, because saic's local mass there is real. - deconflict at redstone where saic is the entrenched m&s/hwil incumbent. on the s3i baselines the winnable ground is the independent test, verification, and engineering wrap, and any scope where a fresh, non-incumbent team lowers customer risk. consider teaming or lane-splitting rather than a head-on prime bid on their strongest turf. (needs internal input: any existing teaming, nda, or deconfliction history with saic business units.) - **they say:** \"saic already runs the avmc modeling and simulation work, so they know the environment.\" **we say:** incumbency on the m&s baseline is exactly why the government values an independent test and engineering voice with no stake in defending that baseline. score dedicated key personnel and independence, not just familiarity. - **they say:** \"saic is a $7 billion integrator with the scale to carry this.\" **we say:** scale that is shrinking and reorganizing is not the same as dedicated capacity. ask every offeror what percentage of named key personnel are committed full time and resident at your site, and how their program survived the offeror's latest restructuring. - **they say:** \"they bring an all-domain, concept-to-combat prototyping brand.\" **we say:** marketing breadth is not delivery relevance. score past performance at the size and services scope of this actual effort, with named staff, not corporate campaign themes. - **they say:** \"a large incumbent is the low-risk choice.\" **we say:** ask what has changed on their side. a new ceo, a five-into-three reorganization, a declared exit from part of their business, and recent lost recompetes make continuity the real risk question. a stable, focused team is the lower-risk path. - \"how will the evaluation ensure that offerors who build or integrate the hardware, munitions, or command-and-control systems relevant to this effort identify and mitigate organizational conflicts of interest, so the government preserves independent test and engineering advice?\" - \"what percentage of proposed key personnel will be dedicated full time and resident within commuting distance of the government site at contract start, rather than matrixed from a broad corporate portfolio?\" - \"how will offerors demonstrate account and staffing continuity through recent or ongoing corporate reorganizations and leadership changes, and what is their plan to protect this program from that turbulence?\" - \"how will offerors demonstrate continuity and transition-risk mitigation, given recent turnover of incumbents on comparable recompetes?\" - \"how will cited past performance be validated for relevance at the size and services scope of this effort, as opposed to prototyping or integration heritage on much larger, differently scoped programs?\" ### g1 - independence from the systems under test - ghost: \"offerors should identify any organizational conflicts of interest arising from their production, integration, or ownership of the hardware or command-and-control systems relevant to this effort, and describe how their mitigation approach preserves objective, independent test, evaluation, and engineering advice to the government throughout the period of performance.\" - targets: w1 - proof: pp7 ### g2 - continuity and transition risk on recompete - ghost: \"offerors should describe how they will ensure continuity and stability of engineering support across the full period of performance, including dedicated, named key personnel and a transition approach that mitigates risk where prior efforts have experienced incumbent turnover.\" - targets: w4 - proof: pp8 ### g3 - program insulation from corporate reorganization - ghost: \"offerors should describe how this effort will be insulated from organizational restructuring, executive transition, or portfolio realignment on the offeror's side, and demonstrate the governance and dedicated resourcing that keep senior management attention and staffing stable throughout performance.\" - targets: w5 - proof: pp12 ### g4 - resident engineering presence at the government test site - ghost: \"offerors should demonstrate an established, currently staffed engineering presence at or near the government test site, including resident headcount, cleared personnel on site, and facilities available at contract start, rather than reliance on a distributed corporate footprint or a prototyping team managed from elsewhere.\" - targets: w6 - proof: pp4 ### g5 - dedicated resourcing independent of a contracting portfolio - ghost: \"offerors should demonstrate that the resources, reach-back, and investment committed to this effort are dedicated and durable, and not subject to reduction as the offeror repositions or contracts other parts of its business.\" - targets: w3 - proof: pp1 facts: saic is a ~$7.3b prime running an adjusted ebitda margin near 9.7%, a services-weighted margin profile lower than product-heavy primes and consistent with a labor-driven integrator [s3]. fy2026 revenue declined ~3% and fy2027 was guided to a further decline, with management pairing the revenue cut to procurement delays and unfavorable award decisions against a promise of higher margins through efficiency [s3]. judgment, labeled as such: a prime of this size typically wraps higher than a focused mid-size services firm on labor-rate-driven test, seta, and mission-engineering competitions, so saic is most beatable where evaluated price turns on the burdened rate. a company defending margin while shrinking may bid disciplined rather than buy-in on labor-driven recompetes, but could price aggressively to hold flagship incumbencies (redstone s3i, space sustainment) it cannot afford to lose. we hold no documented rate intelligence on saic's engineering-services entities. (needs internal input: wrap-rate or evaluated-price observations from any shared competitions on oasis/oasis+, amcom express, redstone vehicles, or the air force and space enterprises.) ### pp1 - scale and a contracting top line saic reported fy2025 (year ended 2025-01-31) revenue of $7.48b with 3.1% organic growth, and fy2026 (ended 2026-01-30) revenue of $7.26b, down ~3%, with adjusted ebitda of $708m (9.7% margin) [s1][s3]. management set initial fy2027 guidance at roughly $7.0-7.2b, a 2-4% decline, and fy2027 q1 (ended 2026-05-01) revenue was $1.91b [s3][s4]. the company employs ~24,000 people and runs two segments, defense and intelligence and civilian, from reston, va [s2]. ### pp2 - redstone avmc s3i incumbency in april 2021 saic won two devcom avmc software, simulation, systems engineering and integration (s3i) directorate awards through gsa oasis and army contracting command-redstone: an $800m five-year modeling-and-simulation systems-engineering contract (live-virtual-constructive m&s, mbse, missile-defense and multi-domain system-of-systems), and a $3.6b eight-year contract (plus a six-month option) for engineering services supporting hardware-in-the-loop and m&s development, performed primarily in huntsville [s10][s11]. ### pp3 - amcom express and software engineering directorate heritage saic holds the army amcom express (expedited professional and engineering support services) bpa and was awarded an approximately $757m single-award task order under it (2015) for systems and computer resources support to the amrdec software engineering directorate at redstone arsenal [s12]. ### pp4 - hope 2.0 af tencap prototyping in june 2025 saic was awarded hope 2.0, a $928m five-year contract (july 2025 start) providing rdt&e mission-engineering services to air force tactical exploitation of national capabilities (af tencap), producing near-program-of-record prototypes and integrating ic and dod capabilities across roughly 65 agencies and commands, partnering with a dozen-plus traditional and nontraditional firms [s13]. ### pp5 - cobra cjadc2 digital engineering in november 2025 saic secured cobra (collaborative operations for battlespace resilient architecture), a $1.4b five-year task order to accelerate cjadc2 modernization through digital engineering, rapid prototyping and quick-reaction capabilities, test and evaluation, modeling-and-simulation, and command-and-control integration across all domains [s14]. ### pp6 - space force and sda footprint saic holds gmass, a $574m space systems command ground-based radar maintenance and sustainment contract (upgraded early warning radars and parcs, colorado springs, through march 2030), a $390m systems-engineering-and-integration task order for the space force, and the sda pwsa tranche 3 program-integration contract ($55m, 2025 start) [s15]. ### pp7 - navy propulsion test and torpedo hardware saic won a navy propulsion-test-facility operate-maintain-upgrade contract (~$242m) and produces the mk48 mod 7 heavyweight-torpedo afterbody and fuel tank, an initial ~$123.7m award with potential total value up to ~$1.1b, giving it both navy test-facility operations and torpedo hardware content [s17]. ### pp8 - lost the castle-net recompete and protest in 2026 saic lost the $1.4b castle-net contract (army corps of engineers it, cybersecurity, and information-management modernization) to accenture federal services; gao denied saic's protest on 2026-05-19. saic had been the incumbent under the predecessor revolutionary information technology services task order it won in 2021, and because castle-net is a task order it could not escalate to the court of federal claims [s18]. ### pp9 - excluded from and lost protest over a $972m air force m&s competition in 2025 the air force removed incumbent saic from competition for an approximately $972m modeling-and-simulation services contract because saic did not have the highest score on the two-part self-scoring methodology; gao denied saic's protest in july 2025. the award (to northrop) was later reopened in december 2025 over conflict-of-interest allegations [s19]. gao's fy2025 data show 1,688 protests filed and a 14% sustain rate, a hard environment in which to overturn an award [s27]. ### pp10 - federal-contractor ranking slippage trade coverage reports saic dropping to roughly 11th among federal contractors after losing a major dod it vehicle recompete and divesting non-core lines; its fy2023 federal contract obligations were about $5.64b per usaspending-derived figures (secondary source, not verified against primary fpds) [s20]. ### pp11 - ceo transition saic removed ceo toni townes-whitley \"without cause\" on 2025-10-23 after two years, and appointed former leidos cfo james (jim) reagan interim ceo, made permanent effective 2026-02-17 [s6]. ### pp12 - five-into-three reorganization effective 2026-01-31 saic consolidated five business groups into three: army-navy (ang), air force / space and intelligence (afsi), and civilian, a restructuring management framed as simplifying structure and sharpening focus [s7]. ### pp13 - pivot away from enterprise it in 2026 saic declared a partial pivot away from commodity enterprise it (about 10% of the company) toward \"mission it\" and engineering, including systems engineering and technical assistance and mission-planning networks, a repositioning led by ceo reagan [s8]. ### pp14 - silveredge acquisition saic agreed in october 2025 to acquire silveredge government solutions from godspeed capital for $205m in cash, adding cybersecurity, software, and ai capability (including the soar saas suite and the mynai agentic-ai product) serving the intelligence community and dod [s21]. ### pp15 - portfolio history: divestiture and acquisitions saic sold its logistics and supply-chain business (a dla-facing line) to asrc federal for $356m, closing 2023-05-06 with ~240 employees transferring [s22]. its scale was built by acquiring engility in 2019 ($2.5b all-stock, roughly doubling intelligence and space revenue) and unisys federal in 2020 ($1.2b of enterprise it) [s23]. ### pp16 - space-ground and cloud heritage with a protest history saic's space-ground franchise traces to the $655m edis satellite-ground-systems program at kirtland and schriever: engility won it in january 2019, peraton's protest was sustained by gao in june 2019, and saic (having acquired engility) was re-selected in february 2020 [s16]. on the air force side saic won the $727m cloud one contract in 2019 and defended it when gao denied incumbent leidos's protest after leidos was disqualified for an organizational conflict of interest [s25]. - 2026-06 - reported fy2027 q1 (ended 2026-05-01) revenue of $1.91b and raised fy2027 adjusted ebitd
