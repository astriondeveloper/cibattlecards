name: Deploy battle card site to Pages

# Publishes the committed static site in docs/ to GitHub Pages.
# NOTE: this repository is public, so the published site is PUBLIC. The site
# carries competition-sensitive markings; keep the repo private (and move to a
# GitHub Enterprise Cloud org for access-controlled Pages) when ready.

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Configure Pages (enable if needed)
        uses: actions/configure-pages@v5
        with:
          enablement: true
      - name: Upload docs/ as the Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
